    function toggleRegenImportTokenField() {
      const wrap = document.getElementById('rgn_plainTokenWrap');
      const checked = document.getElementById('rgn_importToken')?.checked;
      if (wrap) wrap.style.display = checked ? '' : 'none';
    }

    async function submitRegenerateToken(id, channelId) {
      const importToken = document.getElementById('rgn_importToken')?.checked;
      const plainToken = importToken ? (document.getElementById('rgn_plainToken')?.value?.trim() || '') : '';
      if (importToken) {
        if (!plainToken) { alert('새 x-token 값을 입력하세요.'); return; }
        if (!/^[A-Za-z0-9_\-]{16,128}$/.test(plainToken)) {
          alert('x-token은 16~128자, 영문/숫자/언더스코어/하이픈만 허용됩니다.');
          return;
        }
      }

      const body = importToken ? JSON.stringify({ plainToken }) : '{}';
      const data = await api(`/api/portal/cs/manufacturers/${id}/regenerate-token`, { method: 'POST', body });
      if (data?.success) {
        const title = data.data?.imported ? '토큰 재발급 완료 — 임포트' : '토큰 재발급 완료';
        showTokenModal(data.data.plainToken, channelId, title);
        loadManufacturers(1);
      } else {
        alert(data?.error?.message || '재발급 실패');
      }
    }

    async function deactivateManufacturer(id) {
      if (!confirm('이 제조사를 비활성화하시겠습니까?\n비활성화 후 해당 제조사의 모든 /auths 요청이 거부됩니다.')) return;
      const data = await api(`/api/portal/cs/manufacturers/${id}`, { method: 'DELETE' });
      if (data?.success) loadManufacturers(1);
      else alert(data?.error?.message || '비활성화 실패');
    }

    // ============================================================
    // Firmware (펌웨어 관리) — Phase 4-B UI
    // ============================================================
    let _fwTab = 'list'; // 'list' | 'campaigns'
    let _fwFacets = null; // { modelNames, vendors, sites } — 캠페인 모달용

    async function loadFirmware() {
      const tabs = `
        <div style="display:flex;gap:8px;margin-bottom:16px;border-bottom:1px solid #E2E8F0;">
          <button class="btn-cancel" style="border:0;border-bottom:2px solid ${_fwTab==='list'?'#3B82F6':'transparent'};color:${_fwTab==='list'?'#3B82F6':'#64748B'};border-radius:0;background:transparent;font-weight:600;padding:10px 16px;cursor:pointer;" onclick="switchFwTab('list')">펌웨어 목록</button>
          <button class="btn-cancel" style="border:0;border-bottom:2px solid ${_fwTab==='campaigns'?'#3B82F6':'transparent'};color:${_fwTab==='campaigns'?'#3B82F6':'#64748B'};border-radius:0;background:transparent;font-weight:600;padding:10px 16px;cursor:pointer;" onclick="switchFwTab('campaigns')">캠페인</button>
        </div>
        <div id="fwBody"></div>`;
      setContent(tabs);
      if (_fwTab === 'list') await renderFirmwareList(1);
      else await renderFirmwareCampaigns(1);
    }

    function switchFwTab(tab) { _fwTab = tab; loadFirmware(); }

    async function renderFirmwareList(page) {
      const body = document.getElementById('fwBody');
      if (!body) return;
      body.innerHTML = '<div class="loading-overlay"><div class="big-spinner"></div></div>';
      const data = await api(`/api/portal/cs/firmware?page=${page}&limit=20`);
      const items = data?.data?.items || [];
      const totalPages = data?.data?.totalPages || 1;

      const fmt = (b) => b < 1024 ? `${b} B` : b < 1024*1024 ? `${(b/1024).toFixed(1)} KB` : `${(b/1024/1024).toFixed(2)} MB`;
      const rows = items.map((f) => `
        <tr>
          <td>${f.id}</td>
          <td><strong>${esc(f.version)}</strong></td>
          <td>${esc(f.originalName)}</td>
          <td>${esc(f.chargerModel || '-')}</td>
          <td>${esc(f.chargerVendor || '-')}</td>
          <td>${fmt(f.fileSize)}</td>
          <td><span style="font-family:monospace;font-size:11px;color:#64748B;" title="${f.sha256}">${f.sha256.slice(0,12)}...</span></td>
          <td>${f.isActive ? '<span style="color:#10B981;font-weight:600;">활성</span>' : '<span style="color:#94A3B8;">비활성</span>'}</td>
          <td style="font-size:12px;color:#64748B;">${esc(f.uploadedBy)}<br>${new Date(f.uploadedAt).toLocaleString('ko-KR')}</td>
          <td style="white-space:nowrap;">
            ${f.isActive ? `<button class="btn-primary" style="padding:6px 12px;font-size:12px;" onclick="openCampaignStart(${f.id}, '${esc(f.version)}')">캠페인 시작</button>` : ''}
            <button class="btn-cancel" style="padding:6px 10px;font-size:12px;" onclick="openEditFirmware(${f.id})">수정</button>
            <button class="btn-danger-sm" onclick="deleteFirmware(${f.id})">삭제</button>
          </td>
        </tr>
      `).join('');

      const prev = page > 1 ? `<button class="page-btn" onclick="renderFirmwareList(${page-1})">&lt;</button>` : '';
      const next = page < totalPages ? `<button class="page-btn" onclick="renderFirmwareList(${page+1})">&gt;</button>` : '';

      body.innerHTML = `
        <div class="page-header">
          <div>
            <div class="page-title">펌웨어 목록</div>
            <div class="page-subtitle">충전기에 OTA 배포할 펌웨어 바이너리 관리 (SHA256 기반 중복 방지)</div>
          </div>
          <button class="btn-primary" onclick="openFirmwareUpload()">+ 펌웨어 업로드</button>
        </div>
        <div class="card">
          <div class="table-wrap">
            <table class="data-table">
              <thead><tr><th>ID</th><th>버전</th><th>파일명</th><th>모델</th><th>제조사</th><th>크기</th><th>SHA256</th><th>상태</th><th>업로드</th><th>액션</th></tr></thead>
              <tbody>${rows || '<tr><td colspan="10" style="text-align:center;padding:32px;color:#94A3B8;">등록된 펌웨어가 없습니다.</td></tr>'}</tbody>
            </table>
          </div>
          <div class="pagination">${prev}<span class="page-btn active">${page}</span>${next}</div>
        </div>`;
    }

    function openFirmwareUpload() {
      openModal(`
        <div class="modal-title">펌웨어 업로드</div>
        <div class="form-group">
          <label class="form-label">펌웨어 파일 *</label>
          <input class="form-input" type="file" id="fw_file" accept=".bin,.hex,.zip,.tar,.gz,*">
          <div style="font-size:11px;color:#64748B;margin-top:4px;">최대 100MB. 동일 SHA256 바이너리는 재업로드 불가.</div>
        </div>
        <div class="form-group">
          <label class="form-label">버전 *</label>
          <input class="form-input" id="fw_version" placeholder="예: 1.2.3">
        </div>
        <div class="form-group">
          <label class="form-label">대상 모델</label>
          <input class="form-input" id="fw_model" placeholder="예: VDA-7kW-AC01 (선택)">
        </div>
        <div class="form-group">
          <label class="form-label">제조사</label>
          <input class="form-input" id="fw_vendor" placeholder="예: VendorA (선택)">
        </div>
        <div class="form-group">
          <label class="form-label">메모</label>
          <textarea class="form-input" id="fw_notes" rows="3" placeholder="릴리즈 노트, 변경점 등 (선택)"></textarea>
        </div>
        <div class="modal-footer">
          <button class="btn-cancel" onclick="closeModal()">취소</button>
          <button class="btn-primary" id="fw_upload_btn" onclick="submitFirmwareUpload()">업로드</button>
        </div>
      `);
    }

    async function submitFirmwareUpload() {
      const fileEl = document.getElementById('fw_file');
      const file = fileEl?.files?.[0];
      const version = document.getElementById('fw_version')?.value?.trim();
      const chargerModel = document.getElementById('fw_model')?.value?.trim();
      const chargerVendor = document.getElementById('fw_vendor')?.value?.trim();
      const notes = document.getElementById('fw_notes')?.value?.trim();
      if (!file || !version) { alert('파일과 버전을 입력하세요.'); return; }

      const fd = new FormData();
      fd.append('file', file);
      fd.append('version', version);
      if (chargerModel) fd.append('chargerModel', chargerModel);
      if (chargerVendor) fd.append('chargerVendor', chargerVendor);
      if (notes) fd.append('notes', notes);

      const btn = document.getElementById('fw_upload_btn');
      if (btn) { btn.disabled = true; btn.textContent = '업로드 중...'; }

      try {
        const res = await fetch('/api/portal/cs/firmware', {
          method: 'POST',
          headers: { 'Authorization': 'Bearer ' + localStorage.getItem('cp_token') },
          body: fd,
        });
        const data = await res.json();
        if (data?.success) {
          closeModal();
          renderFirmwareList(1);
        } else {
          alert(data?.error?.message || '업로드 실패');
          if (btn) { btn.disabled = false; btn.textContent = '업로드'; }
        }
      } catch (err) {
        alert('업로드 중 오류: ' + (err?.message || err));
        if (btn) { btn.disabled = false; btn.textContent = '업로드'; }
      }
    }

          <button class="btn-cancel" onclick="closeModal()">취소</button>
          <button class="btn-primary" onclick="submitEditFirmware(${f.id})">저장</button>
        </div>
      `);
    }

    async function submitEditFirmware(id) {
      const body = {
        version: document.getElementById('efw_version')?.value?.trim(),
        chargerModel: document.getElementById('efw_model')?.value?.trim() || undefined,
        chargerVendor: document.getElementById('efw_vendor')?.value?.trim() || undefined,
        isActive: document.getElementById('efw_active')?.value === 'true',
        notes: document.getElementById('efw_notes')?.value?.trim() || undefined,
      };
      const data = await api(`/api/portal/cs/firmware/${id}`, { method: 'PATCH', body: JSON.stringify(body) });
      if (data?.success) { closeModal(); renderFirmwareList(1); }
      else alert(data?.error?.message || '수정 실패');
    }

    async function deleteFirmware(id) {
      if (!confirm('이 펌웨어를 삭제하시겠습니까?\n캠페인 사용 이력이 있으면 삭제 거부됩니다 (그 경우 비활성화 권장).')) return;
      const data = await api(`/api/portal/cs/firmware/${id}`, { method: 'DELETE' });
      if (data?.success) renderFirmwareList(1);
      else alert(data?.error?.message || '삭제 실패');
    }

    async function openCampaignStart(firmwareId, version) {
      if (!_fwFacets) {
        const r = await api('/api/portal/cs/stations/facets');
        _fwFacets = r?.data || { modelNames: [], vendors: [], sites: [] };
      }
      openModal(`
        <div class="modal-title">캠페인 시작 — 펌웨어 ${esc(version)}</div>
        <div style="background:#FEF3C7;border:1px solid #F59E0B;border-radius:8px;padding:10px 14px;margin-bottom:14px;font-size:12px;color:#92400E;">
          대상 충전기 모두에 즉시 UpdateFirmware 명령이 송신됩니다. 오프라인 충전기는 send_error 로 기록됩니다.
        </div>
        <div class="form-group">
          <label class="form-label">대상 선택 방식</label>
          <select class="form-select" id="cmp_targetType" onchange="onCampaignTargetTypeChange()">
            <option value="stationIds">충전기 ID 목록 (콤마 구분)</option>
            <option value="model">모델명 매칭</option>
            <option value="vendor">제조사명 매칭</option>
            <option value="siteId">충전소 ID</option>
          </select>
        </div>
        <div class="form-group" id="cmp_targetInputWrap">
          <label class="form-label">충전기 ID 목록 *</label>
          <textarea class="form-input" id="cmp_targetInput" rows="3" placeholder="예: EN0000001, EN0000002, EN0000003"></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">메모</label>
          <textarea class="form-input" id="cmp_notes" rows="2" placeholder="배포 사유 등 (선택)"></textarea>
        </div>
        <div class="modal-footer">
          <button class="btn-cancel" onclick="closeModal()">취소</button>
          <button class="btn-primary" onclick="submitCampaignStart(${firmwareId})">시작</button>
        </div>
      `);
    }

    function onCampaignTargetTypeChange() {
      const t = document.getElementById('cmp_targetType')?.value;
      const wrap = document.getElementById('cmp_targetInputWrap');
      if (!wrap) return;

      if (t === 'stationIds') {
        wrap.innerHTML = `
          <label class="form-label">충전기 ID 목록 *</label>
          <textarea class="form-input" id="cmp_targetInput" rows="3"
                    placeholder="예: EN0000001, EN0000002, EN0000003"></textarea>`;
        return;
      }

      const facets = _fwFacets || { modelNames: [], vendors: [], sites: [] };
      let label = '', options = '', placeholder = '';

      if (t === 'model') {
        label = '모델명 *';
        placeholder = '예: VDA-7kW-AC01';
        options = facets.modelNames.map(v => `<option value="${esc(v)}">${esc(v)}</option>`).join('');
      } else if (t === 'vendor') {
        label = '제조사명 *';
        placeholder = '예: VendorA';
        options = facets.vendors.map(v => `<option value="${esc(v)}">${esc(v)}</option>`).join('');
      } else if (t === 'siteId') {
        label = '충전소 ID *';
        placeholder = '예: 5';
        options = facets.sites
          .map(s => `<option value="${s.id}">${s.id} — ${esc(s.name)}</option>`)
          .join('');
      }

      wrap.innerHTML = `
        <label class="form-label">${label}</label>
        <select class="form-select" id="cmp_targetSelect" onchange="onCampaignTargetSelectChange()">
          <option value="">-- 선택 --</option>
          ${options}
          <option value="__custom__">직접 입력...</option>
        </select>
        <input class="form-input" id="cmp_targetInput" placeholder="${placeholder}"
               style="display:none;margin-top:8px;">`;
    }

    function onCampaignTargetSelectChange() {
      const sel = document.getElementById('cmp_targetSelect');
      const inp = document.getElementById('cmp_targetInput');
      if (!sel || !inp) return;
      inp.style.display = sel.value === '__custom__' ? '' : 'none';
      if (sel.value !== '__custom__') inp.value = '';
    }

    async function submitCampaignStart(firmwareId) {
      const t = document.getElementById('cmp_targetType')?.value;
      const notes = document.getElementById('cmp_notes')?.value?.trim();

      let raw = '';
      if (t === 'stationIds') {
        raw = document.getElementById('cmp_targetInput')?.value?.trim() || '';
      } else {
        const sel = document.getElementById('cmp_targetSelect')?.value;
        if (sel === '__custom__') {
          raw = document.getElementById('cmp_targetInput')?.value?.trim() || '';
        } else {
          raw = sel || '';
        }
      }
      if (!raw) { alert('대상을 입력하세요.'); return; }

      const targetFilter = {};
      if (t === 'stationIds') targetFilter.stationIds = raw.split(/[,\n]/).map(s => s.trim()).filter(Boolean);
      else if (t === 'model') targetFilter.model = raw;
      else if (t === 'vendor') targetFilter.vendor = raw;
      else if (t === 'siteId') {
        const n = Number(raw);
        if (!n || n <= 0) { alert('유효한 충전소 ID 를 입력하세요.'); return; }
        targetFilter.siteId = n;
      }

      const data = await api(`/api/portal/cs/firmware/${firmwareId}/campaigns`, {
        method: 'POST',
        body: JSON.stringify({ targetFilter, notes }),
      });
      if (data?.success) {
        closeModal();
        alert(`캠페인 시작 완료 (대상 ${data.data.totalTargets || '?'}대)`);
        _fwTab = 'campaigns';
        loadFirmware();
      } else {
        alert(data?.error?.message || '캠페인 시작 실패');
      }
    }

    async function renderFirmwareCampaigns(page) {
      const body = document.getElementById('fwBody');
      if (!body) return;
      body.innerHTML = '<div class="loading-overlay"><div class="big-spinner"></div></div>';
      const data = await api(`/api/portal/cs/firmware/campaigns?page=${page}&limit=20`);
      const items = data?.data?.items || [];
      const totalPages = data?.data?.totalPages || 1;

      const statusBadge = (s) => {
        if (s === 'running') return '<span style="color:#3B82F6;font-weight:600;">진행중</span>';
        if (s === 'completed') return '<span style="color:#10B981;font-weight:600;">완료</span>';
        if (s === 'cancelled') return '<span style="color:#94A3B8;">취소됨</span>';
        return s;
      };

      const rows = items.map((c) => `
        <tr>
          <td>${c.id}</td>
          <td><strong>${esc(c.firmware?.version || '?')}</strong><br><span style="font-size:11px;color:#64748B;">${esc(c.firmware?.originalName || '')}</span></td>
          <td>${statusBadge(c.status)}</td>
          <td>${c._count?.progress ?? 0} 대</td>
          <td style="font-size:12px;">${esc(c.startedBy)}<br>${new Date(c.startedAt).toLocaleString('ko-KR')}</td>
          <td style="font-size:12px;color:#64748B;">${c.completedAt ? new Date(c.completedAt).toLocaleString('ko-KR') : '-'}</td>
          <td style="white-space:nowrap;">
            <button class="btn-cancel" style="padding:6px 10px;font-size:12px;" onclick="openCampaignDetail(${c.id})">상세</button>
            ${c.status === 'running' ? `<button class="btn-danger-sm" onclick="cancelCampaign(${c.id})">취소</button>` : ''}
          </td>
        </tr>
      `).join('');

      const prev = page > 1 ? `<button class="page-btn" onclick="renderFirmwareCampaigns(${page-1})">&lt;</button>` : '';
      const next = page < totalPages ? `<button class="page-btn" onclick="renderFirmwareCampaigns(${page+1})">&gt;</button>` : '';

      body.innerHTML = `
        <div class="page-header">
          <div>
            <div class="page-title">펌웨어 캠페인</div>
            <div class="page-subtitle">일괄 업데이트 캠페인 진행 상황</div>
          </div>
          <button class="btn-cancel" onclick="renderFirmwareCampaigns(${page})">새로고침</button>
        </div>
        <div class="card">
          <div class="table-wrap">
            <table class="data-table">
              <thead><tr><th>ID</th><th>펌웨어</th><th>상태</th><th>대상</th><th>시작</th><th>완료</th><th>액션</th></tr></thead>
              <tbody>${rows || '<tr><td colspan="7" style="text-align:center;padding:32px;color:#94A3B8;">캠페인이 없습니다. 펌웨어 목록에서 시작하세요.</td></tr>'}</tbody>
            </table>
          </div>
          <div class="pagination">${prev}<span class="page-btn active">${page}</span>${next}</div>
        </div>`;
    }

    async function openCampaignDetail(id) {
      const data = await api(`/api/portal/cs/firmware/campaigns/${id}`);
      const c = data?.data;
      if (!c) { alert('캠페인을 찾을 수 없습니다.'); return; }
      const progress = c.progress || [];
      const counts = progress.reduce((acc, p) => { acc[p.status] = (acc[p.status]||0)+1; return acc; }, {});
      const statusOrder = ['queued','sent','downloading','downloaded','installing','installed','failed','send_error'];
      const summary = statusOrder.filter(s => counts[s]).map(s => `<span style="display:inline-block;margin-right:12px;font-size:12px;"><strong>${s}:</strong> ${counts[s]}</span>`).join('');

      const rows = progress.map((p) => `
        <tr>
          <td><strong>${esc(p.stationId || '<unlinked>')}</strong></td>
          <td>${esc(p.status)}</td>
          <td style="font-size:11px;color:#64748B;">${p.startedAt ? new Date(p.startedAt).toLocaleString('ko-KR') : '-'}</td>
          <td style="font-size:11px;color:#64748B;">${p.completedAt ? new Date(p.completedAt).toLocaleString('ko-KR') : '-'}</td>
          <td style="font-size:11px;color:#EF4444;">${esc(p.error || '')}</td>
        </tr>
      `).join('');

      openModal(`
        <div class="modal-title">캠페인 #${c.id} 상세 — ${esc(c.firmware?.version || '?')}</div>
        <div style="background:#F8FAFC;border:1px solid #E2E8F0;border-radius:8px;padding:10px 14px;margin-bottom:14px;font-size:12px;">
          <div><strong>상태:</strong> ${esc(c.status)}</div>
          <div><strong>시작:</strong> ${esc(c.startedBy)} / ${new Date(c.startedAt).toLocaleString('ko-KR')}</div>
          ${c.completedAt ? `<div><strong>완료:</strong> ${new Date(c.completedAt).toLocaleString('ko-KR')}</div>` : ''}
          ${c.notes ? `<div><strong>메모:</strong> ${esc(c.notes)}</div>` : ''}
          <div style="margin-top:6px;">${summary || '진행 데이터 없음'}</div>
        </div>
        <div class="table-wrap" style="max-height:400px;overflow:auto;">
          <table class="data-table" style="font-size:12px;">
            <thead><tr><th>충전기 ID</th><th>상태</th><th>시작</th><th>완료</th><th>오류</th></tr></thead>
            <tbody>${rows || '<tr><td colspan="5" style="text-align:center;padding:24px;color:#94A3B8;">progress 없음</td></tr>'}</tbody>
          </table>
        </div>
        <div class="modal-footer">
          <button class="btn-cancel" onclick="closeModal()">닫기</button>
          ${c.status === 'running' ? `<button class="btn-danger-sm" onclick="cancelCampaign(${c.id})">캠페인 취소</button>` : ''}
        </div>
      `);
    }

    async function cancelCampaign(id) {
      if (!confirm(`캠페인 #${id} 를 취소하시겠습니까?\n이미 송신된 명령은 되돌릴 수 없습니다.`)) return;
      const data = await api(`/api/portal/cs/firmware/campaigns/${id}/cancel`, { method: 'POST', body: '{}' });
      if (data?.success) {
        closeModal();
        _fwTab = 'campaigns';
        loadFirmware();
      } else {
        alert(data?.error?.message || '취소 실패');
      }
    }

    // ============================================================
    // PnC 운영 — ISO 15118 Plug & Charge
    // ============================================================
    let _pncTab = 'overview'; // 'overview' | 'certs' | 'csr' | 'audit'

    async function loadPnc() {
      const tabs = [
        ['overview', '개요'],
        ['certs', '인증서 인벤토리'],
        ['csr', 'CSR 진행'],
        ['audit', '감사 로그'],
      ];
      const tabBar = tabs.map(([k, label]) =>
        `<button class="btn-cancel" style="border:0;border-bottom:2px solid ${_pncTab===k?'#3B82F6':'transparent'};color:${_pncTab===k?'#3B82F6':'#64748B'};border-radius:0;background:transparent;font-weight:600;padding:10px 16px;cursor:pointer;" onclick="switchPncTab('${k}')">${label}</button>`
      ).join('');
      setContent(`<div style="display:flex;gap:8px;margin-bottom:16px;border-bottom:1px solid #E2E8F0;">${tabBar}</div><div id="pncBody"></div>`);
      if (_pncTab === 'overview') await renderPncOverview();
      else if (_pncTab === 'certs') await renderPncCerts(1);
      else if (_pncTab === 'csr') await renderPncCsr(1);
      else if (_pncTab === 'audit') await renderPncAudit(1);

      if (!d) { body.innerHTML = '<div style="padding:24px;color:#EF4444;">PnC 정보를 불러올 수 없습니다.</div>'; return; }

      const pki = d.pkiHealth || {};
      const ok = (v) => v ? '<span style="color:#10B981;font-weight:600;">●</span>' : '<span style="color:#EF4444;font-weight:600;">●</span>';
      body.innerHTML = `
        <div class="page-header">
          <div>
            <div class="page-title">PnC 개요</div>
            <div class="page-subtitle">사내 V2G PKI 연결성 + 정책 설정 확인</div>
          </div>
          <div>
            <button class="btn-cancel" onclick="renderPncOverview()">새로고침</button>

        <div class="card" style="margin-top:16px;">

          <table class="data-table" style="font-size:13px;">

              <tr><td>HTTP 상태</td><td>${pki.status ?? '-'}</td></tr>

        </div>

    async function submitPncExpiryScan() {

    async function renderPncCerts(page) {
      const body = document.getElementById('pncBody');
      if (!body) return;
      body.innerHTML = '<div class="loading-overlay"><div class="big-spinner"></div></div>';
      const data = await api(`/api/portal/cs/pnc/certificates?page=${page}&limit=20`);
      const items = data?.data?.items || [];
      const totalPages = data?.data?.totalPages || 1;
      const rows = items.map(c => {
        const days = c.daysLeft;
        let color = '#10B981'; let label = `${days}일`;
        if (days < 0) { color='#EF4444'; label=`만료 ${-days}일 경과`; }
        else if (days <= 7) color = '#EF4444';
        else if (days <= 30) color = '#F59E0B';
        return `<tr>
          <td><strong>${esc(c.stationId)}</strong></td>
          <td>${esc(c.certificateType)}</td>
          <td style="font-family:monospace;font-size:11px;" title="${esc(c.serialNumber)}">${esc(c.serialNumber.slice(0,16))}...</td>
          <td style="font-size:11px;color:#64748B;">${new Date(c.notAfter).toLocaleDateString('ko-KR')}</td>
          <td><span style="color:${color};font-weight:600;">${label}</span></td>
          <td><button class="btn-primary" style="padding:6px 12px;font-size:12px;" onclick="triggerPncRenewal('${esc(c.stationId)}')">TriggerMessage</button></td>
        </tr>`;
      }).join('');
      const prev = page > 1 ? `<button class="page-btn" onclick="renderPncCerts(${page-1})">&lt;</button>` : '';
      const next = page < totalPages ? `<button class="page-btn" onclick="renderPncCerts(${page+1})">&gt;</button>` : '';
      body.innerHTML = `
        <div class="page-header">
          <div>
            <div class="page-title">인증서 인벤토리</div>
            <div class="page-subtitle">EVSE Leaf / V2GRoot / MORoot — notAfter 기준 색상 (빨강&lt;=7일 / 주황&lt;=30일)</div>
          </div>
          <button class="btn-cancel" onclick="renderPncCerts(${page})">새로고침</button>
        </div>
        <div class="card">
          <div class="table-wrap">
            <table class="data-table">
              <thead><tr><th>충전기</th><th>유형</th><th>Serial</th><th>만료일</th><th>잔여</th><th>액션</th></tr></thead>
              <tbody>${rows || '<tr><td colspan="6" style="text-align:center;padding:32px;color:#94A3B8;">등록된 인증서가 없습니다. (SignCertificate 흐름 후 자동 등록됨)</td></tr>'}</tbody>
            </table>
          </div>
          <div class="pagination">${prev}<span class="page-btn active">${page}</span>${next}</div>
        </div>`;
    }

    async function triggerPncRenewal(stationId) {
      if (!confirm(`${stationId} 에 PnC TriggerMessage 를 즉시 발행합니다.\n충전기가 새 SignCertificate.req 를 송신합니다.`)) return;
      const data = await api(`/api/portal/cs/pnc/trigger/${encodeURIComponent(stationId)}`, { method: 'POST', body: '{}' });
      const d = data?.data;
      if (d?.ok) alert(`Accepted — 충전기가 곧 SignCertificate 를 송신합니다.`);
      else alert(`실패: ${d?.error || d?.status || data?.error?.message || 'unknown'}`);
    }

    async function renderPncCsr(page) {
      const body = document.getElementById('pncBody');
      if (!body) return;
      body.innerHTML = '<div class="loading-overlay"><div class="big-spinner"></div></div>';
      const data = await api(`/api/portal/cs/pnc/csr-progress?page=${page}&limit=20`);
      const items = data?.data?.items || [];
      const totalPages = data?.data?.totalPages || 1;
      const statusColor = (s) => ({
        pending:'#3B82F6', signed:'#8B5CF6', delivered:'#10B981',
        rejected:'#EF4444', failed:'#EF4444'
      })[s] || '#64748B';
      const rows = items.map(c => `<tr>
        <td>${c.id}</td>
        <td><strong>${esc(c.stationId)}</strong></td>
        <td><span style="color:${statusColor(c.status)};font-weight:600;">${esc(c.status)}</span></td>
        <td style="font-family:monospace;font-size:11px;">${esc((c.csrSha256||'').slice(0,16))}...</td>
        <td style="font-family:monospace;font-size:11px;">${esc(c.leafCertSerial?.slice(0,16) || '-')}</td>
        <td style="font-size:11px;color:#64748B;">${new Date(c.requestedAt).toLocaleString('ko-KR')}</td>
        <td style="font-size:11px;color:#64748B;">${c.deliveredAt ? new Date(c.deliveredAt).toLocaleString('ko-KR') : '-'}</td>
        <td style="font-size:11px;color:#EF4444;">${esc(c.pkiErrorMessage || '')}</td>
      </tr>`).join('');
      const prev = page > 1 ? `<button class="page-btn" onclick="renderPncCsr(${page-1})">&lt;</button>` : '';
      const next = page < totalPages ? `<button class="page-btn" onclick="renderPncCsr(${page+1})">&gt;</button>` : '';
      body.innerHTML = `
        <div class="page-header"><div><div class="page-title">CSR 진행</div><div class="page-subtitle">SignCertificate 처리 추적 (idempotent)</div></div><button class="btn-cancel" onclick="renderPncCsr(${page})">새로고침</button></div>
        <div class="card">
          <div class="table-wrap">
            <table class="data-table">
              <thead><tr><th>ID</th><th>충전기</th><th>상태</th><th>CSR hash</th><th>Leaf serial</th><th>요청</th><th>완료</th><th>오류</th></tr></thead>
              <tbody>${rows || '<tr><td colspan="8" style="text-align:center;padding:32px;color:#94A3B8;">진행 중 CSR 이 없습니다.</td></tr>'}</tbody>
            </table>
          </div>
          <div class="pagination">${prev}<span class="page-btn active">${page}</span>${next}</div>
        </div>`;
    }

    async function renderPncAudit(page) {
      const body = document.getElementById('pncBody');
      if (!body) return;
      body.innerHTML = '<div class="loading-overlay"><div class="big-spinner"></div></div>';
      const data = await api(`/api/portal/cs/pnc/audit?page=${page}&limit=50`);
      const items = data?.data?.items || [];
      const totalPages = data?.data?.totalPages || 1;
      const eventColor = (e) => ({
        'PnC_Authorize':'#3B82F6','PnC_SignCertificate':'#8B5CF6','PnC_CertificateSigned':'#10B981',
        'PnC_PKI_Call':'#64748B','PnC_ExpiryTrigger':'#F59E0B','PnC_ConfigChange':'#06B6D4',
        'PnC_GetCertificateStatus':'#0EA5E9','PnC_Get15118EVCertificate':'#A855F7',
      })[e] || '#94A3B8';
      const rows = items.map(a => `<tr>
        <td style="font-size:11px;">${new Date(a.occurredAt).toLocaleString('ko-KR')}</td>
        <td><span style="color:${eventColor(a.eventType)};font-weight:600;font-size:11px;">${esc(a.eventType)}</span></td>
        <td>${esc(a.stationId || '-')}</td>
        <td>${esc(a.status || '-')}</td>
        <td>${esc(a.eMaid || '-')}</td>
        <td style="font-family:monospace;font-size:11px;">${esc((a.certSerial||'').slice(0,16))}${a.certSerial?'...':''}</td>
        <td><code style="font-size:10px;">${esc(JSON.stringify(a.details || {}).slice(0,80))}</code></td>
      </tr>`).join('');
      const prev = page > 1 ? `<button class="page-btn" onclick="renderPncAudit(${page-1})">&lt;</button>` : '';
      const next = page < totalPages ? `<button class="page-btn" onclick="renderPncAudit(${page+1})">&gt;</button>` : '';
      body.innerHTML = `
        <div class="page-header"><div><div class="page-title">감사 로그</div><div class="page-subtitle">PnC 모든 이벤트 (append-only)</div></div><button class="btn-cancel" onclick="renderPncAudit(${page})">새로고침</button></div>
        <div class="card">
          <div class="table-wrap">
            <table class="data-table">
              <thead><tr><th>시각</th><th>이벤트</th><th>충전기</th><th>상태</th><th>eMAID</th><th>cert serial</th><th>details</th></tr></thead>
              <tbody>${rows || '<tr><td colspan="7" style="text-align:center;padding:32px;color:#94A3B8;">기록이 없습니다.</td></tr>'}</tbody>
            </table>
          </div>
          <div class="pagination">${prev}<span class="page-btn active">${page}</span>${next}</div>
        </div>`;
    }

    // ============================================================
    // Modal helpers
    // ============================================================
    function openModal(html) {
      document.getElementById('modalContent').innerHTML = html;
      document.getElementById('modalOverlay').classList.add('open');
    }

    function closeModal() {
      document.getElementById('modalOverlay').classList.remove('open');
    }

    function switchModalTab(tabId) {
      const modal = document.getElementById('modalContent');
      modal.querySelectorAll('.modal-tab-pane').forEach(p => p.classList.remove('active'));
      modal.querySelectorAll('.modal-tab-btn').forEach(b => b.classList.remove('active'));
      const pane = document.getElementById(tabId);
      if (pane) pane.classList.add('active');
      // Activate corresponding button by matching text pattern
      modal.querySelectorAll('.modal-tab-btn').forEach(b => {
        if (b.getAttribute('onclick') && b.getAttribute('onclick').includes(tabId)) {
          b.classList.add('active');
        }
      });
    }

    // ============================================================
    // toggleOpsMenu
    // ============================================================
    function toggleOpsMenu(el) {
      el.classList.toggle('open');
      const sub = document.getElementById('opsSubMenu');
      if (sub) sub.classList.toggle('open');
    }

    // ============================================================
    // Init
    // ============================================================
    applyI18n();
    navigate('dashboard', document.querySelector('.nav-item[data-page="dashboard"]'));
  </script>
</body>
</html>
