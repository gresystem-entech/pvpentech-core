<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pvpentech CS Portal</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Apple SD Gothic Neo', sans-serif;
      background: #F8FAFC;
      color: #0F172A;
      display: flex;
      min-height: 100vh;
    }

    /* ---- Sidebar ---- */
    .sidebar {
      width: 240px;
      min-height: 100vh;
      background: #1E293B;
      display: flex;
      flex-direction: column;
      position: fixed;
      left: 0; top: 0; bottom: 0;
      z-index: 100;
    }

    .sidebar-logo {
      padding: 20px 20px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .sidebar-logo-name { font-size: 18px; font-weight: 700; color: #FFFFFF; letter-spacing: -0.3px; }
    .sidebar-logo-name span { color: #60A5FA; }
    .sidebar-logo-sub { font-size: 11px; color: #64748B; margin-top: 2px; }

    .nav-section { padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.06); }

    .nav-section-label {
      font-size: 10px; font-weight: 600; color: #475569;
      text-transform: uppercase; letter-spacing: 0.8px;
      padding: 0 16px 8px;
    }

    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 16px; cursor: pointer;
      color: #94A3B8; font-size: 13.5px; font-weight: 400;
      transition: background 0.12s, color 0.12s;
      text-decoration: none;
      border-left: 3px solid transparent;
      user-select: none;
    }

    .nav-item:hover { background: rgba(255,255,255,0.04); color: #CBD5E1; }

    .nav-item.active {
      background: rgba(37,99,235,0.18);
      color: #FFFFFF; font-weight: 500;
      border-left-color: #2563EB;
    }

    .nav-item .nav-icon { width: 18px; height: 18px; flex-shrink: 0; opacity: 0.7; }
    .nav-item.active .nav-icon { opacity: 1; }

    .nav-item.has-sub { justify-content: space-between; }
    .nav-item.has-sub .nav-left { display: flex; align-items: center; gap: 10px; }
    .chevron { transition: transform 0.2s; opacity: 0.5; font-size: 10px; }
    .nav-item.open .chevron { transform: rotate(90deg); }

    .sub-menu { display: none; background: rgba(0,0,0,0.15); }
    .sub-menu.open { display: block; }
    .sub-menu .nav-item { padding-left: 44px; font-size: 13px; }

    /* ---- Lang buttons ---- */
    .lang-bar {
      padding: 12px 16px;
      display: flex; gap: 6px;
      border-top: 1px solid rgba(255,255,255,0.06);
    }

    .lang-btn {
      padding: 4px 10px;
      border: 1px solid rgba(255,255,255,0.15);
      background: transparent;
      color: #94A3B8;
      border-radius: 5px;
      font-size: 11px;
      cursor: pointer;
      transition: all 0.12s;
    }

    .lang-btn:hover, .lang-btn.active { background: rgba(255,255,255,0.1); color: #FFFFFF; }

    /* ---- Main ---- */
    .main { margin-left: 240px; flex: 1; display: flex; flex-direction: column; min-height: 100vh; }

    /* ---- Header ---- */
    .header {
      height: 60px; background: #FFFFFF;
      border-bottom: 1px solid #E2E8F0;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 28px;
      position: sticky; top: 0; z-index: 50;
    }

    .header-title { font-size: 15px; font-weight: 600; color: #0F172A; }
    .header-right { display: flex; align-items: center; gap: 16px; }

    .user-badge { display: flex; align-items: center; gap: 8px; }

    .user-avatar {
      width: 32px; height: 32px;
      background: #2563EB; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: white; font-size: 12px; font-weight: 600;
    }

    .user-name { font-size: 13px; font-weight: 500; color: #374151; }

    .btn-logout {
      padding: 7px 14px;
      border: 1.5px solid #E2E8F0;
      background: white; color: #64748B;
      border-radius: 7px; font-size: 13px;
      cursor: pointer; transition: all 0.12s;
    }

    .btn-logout:hover { border-color: #CBD5E1; background: #F8FAFC; color: #374151; }

    /* ---- Content ---- */
    .content { padding: 28px; flex: 1; }

    .page-header { margin-bottom: 24px; display: flex; align-items: flex-end; justify-content: space-between; }
    .page-title { font-size: 22px; font-weight: 700; color: #0F172A; }
    .page-subtitle { font-size: 13px; color: #64748B; margin-top: 4px; }

    .btn-primary {
      padding: 9px 18px;
      background: #2563EB; color: white;
      border: none; border-radius: 8px;
      font-size: 13px; font-weight: 500;
      cursor: pointer; transition: background 0.12s;
    }

    .btn-primary:hover { background: #1D4ED8; }

    .btn-secondary {
      padding: 9px 18px;
      background: #F1F5F9; color: #334155;
      border: 1px solid #CBD5E1; border-radius: 8px;
      font-size: 13px; font-weight: 500;
      cursor: pointer; transition: background 0.12s;
    }
    .btn-secondary:hover { background: #E2E8F0; }

    .btn-sm {
      padding: 5px 10px;
      background: #EFF6FF; color: #2563EB;
      border: 1px solid #BFDBFE;
      border-radius: 5px; font-size: 12px;
      cursor: pointer; transition: all 0.12s;
    }

    .btn-sm:hover { background: #DBEAFE; }

    .btn-danger-sm {
      padding: 5px 10px;
      background: #FEF2F2; color: #DC2626;
      border: 1px solid #FECACA;
      border-radius: 5px; font-size: 12px;
      cursor: pointer; transition: all 0.12s;
    }

    .btn-danger-sm:hover { background: #FEE2E2; }

    /* ---- KPI Cards ---- */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 18px; margin-bottom: 28px;
    }

    .kpi-card {
      background: #FFFFFF; border-radius: 12px;
      padding: 20px 22px; border: 1px solid #E2E8F0;
      position: relative; overflow: hidden;
    }

    .kpi-card::before {
      content: ''; position: absolute;
      top: 0; left: 0; right: 0; height: 3px;
      background: var(--accent, #2563EB);
    }

    .kpi-label { font-size: 12px; font-weight: 500; color: #64748B; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
    .kpi-value { font-size: 28px; font-weight: 700; color: #0F172A; line-height: 1; margin-bottom: 6px; }
    .kpi-meta { font-size: 12px; color: #64748B; }

    .kpi-icon {
      position: absolute; top: 18px; right: 18px;
      width: 36px; height: 36px; border-radius: 9px;
      background: var(--icon-bg, #EFF6FF);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }

    /* ---- Table ---- */
    .table-card {
      background: #FFFFFF; border-radius: 12px;
      border: 1px solid #E2E8F0; overflow: hidden;
      margin-bottom: 24px;
    }

    .table-toolbar {
      padding: 16px 20px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid #F1F5F9;
      flex-wrap: wrap; gap: 10px;
    }

    .table-toolbar-title { font-size: 14px; font-weight: 600; color: #0F172A; }

    .search-input {
      padding: 8px 14px;
      border: 1px solid #E2E8F0; border-radius: 8px;
      font-size: 13px; width: 220px;
      outline: none; transition: border-color 0.12s;
    }

    .search-input:focus { border-color: #93C5FD; }

    table { width: 100%; border-collapse: collapse; }

    thead { background: #F8FAFC; }

    th {
      padding: 11px 16px;
      text-align: left;
      font-size: 11px; font-weight: 600;
      color: #64748B; text-transform: uppercase; letter-spacing: 0.5px;
      border-bottom: 1px solid #E2E8F0;
    }

    td {
      padding: 12px 16px;
      font-size: 13px; color: #374151;
      border-bottom: 1px solid #F1F5F9;
    }

    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #F8FAFC; }

    .badge {
      display: inline-block;
      padding: 3px 9px; border-radius: 20px;
      font-size: 11px; font-weight: 500;
    }

    .badge-green { background: #DCFCE7; color: #166534; }
    .badge-red { background: #FEE2E2; color: #991B1B; }
    .badge-yellow { background: #FEF3C7; color: #92400E; }
    .badge-blue { background: #DBEAFE; color: #1E40AF; }
    .badge-gray { background: #F1F5F9; color: #475569; }
    .badge-purple { background: #EDE9FE; color: #5B21B6; }
    .badge-orange { background: #FFF7ED; color: #9A3412; }

    /* ---- Pagination ---- */
    .pagination {
      padding: 14px 20px;
      display: flex; align-items: center; justify-content: space-between;
      border-top: 1px solid #F1F5F9;
    }

    .pagination-info { font-size: 12px; color: #64748B; }

    .pagination-btns { display: flex; gap: 4px; }

    .page-btn {
      width: 32px; height: 32px;
      border: 1px solid #E2E8F0; background: white;
      border-radius: 6px; font-size: 12px;
      cursor: pointer; transition: all 0.12s;
      display: flex; align-items: center; justify-content: center;
    }

    .page-btn:hover { background: #F8FAFC; }
    .page-btn.active { background: #2563EB; color: white; border-color: #2563EB; }
    .page-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ---- Loading / Error ---- */
    .loading-overlay {
      display: flex; align-items: center; justify-content: center;
      padding: 60px; flex-direction: column; gap: 14px;
    }

    .big-spinner {
      width: 36px; height: 36px;
      border: 3px solid #E2E8F0;
      border-top-color: #2563EB;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text { font-size: 14px; color: #64748B; }

    .error-box {
      background: #FEF2F2; border: 1px solid #FECACA;
      color: #DC2626; padding: 16px 20px;
      border-radius: 10px; font-size: 14px;
      margin-bottom: 16px; display: none;
    }

    .empty-state {
      text-align: center; padding: 48px 20px;
      color: #94A3B8; font-size: 14px;
    }

    /* ---- Modal ---- */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.4);
      display: none; align-items: center; justify-content: center;
      z-index: 200;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: white; border-radius: 14px;
      padding: 28px; width: 680px; max-width: 96vw;
      max-height: 88vh; overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }

    .modal-title { font-size: 17px; font-weight: 700; margin-bottom: 20px; }

    .form-group { margin-bottom: 16px; }
    .form-label { font-size: 12px; font-weight: 500; color: #374151; margin-bottom: 6px; display: block; }

    .form-input {
      width: 100%; padding: 9px 12px;
      border: 1px solid #E2E8F0; border-radius: 8px;
      font-size: 13px; outline: none;
      transition: border-color 0.12s;
    }

    .form-input:focus { border-color: #93C5FD; }

    .form-select {
      width: 100%; padding: 9px 12px;
      border: 1px solid #E2E8F0; border-radius: 8px;
      font-size: 13px; outline: none; background: white;
    }

    .modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; }

    .btn-cancel {
      padding: 9px 18px;
      border: 1.5px solid #E2E8F0; background: white;
      color: #64748B; border-radius: 8px;
      font-size: 13px; cursor: pointer;
    }

    /* ---- Modal tabs ---- */
    .modal-tab-bar {
      display: flex; gap: 0;
      margin-bottom: 20px;
      border-bottom: 2px solid #E2E8F0;
    }

    .modal-tab-btn {
      padding: 8px 18px;
      border: none; background: transparent;
      color: #64748B; font-size: 13px; font-weight: 500;
      cursor: pointer; border-bottom: 2px solid transparent;
      margin-bottom: -2px; transition: all 0.12s;
    }

    .modal-tab-btn.active { color: #2563EB; border-bottom-color: #2563EB; }
    .modal-tab-btn:hover { color: #374151; }

    .modal-tab-pane { display: none; }
    .modal-tab-pane.active { display: block; }

    @media (max-width: 1100px) { .kpi-grid { grid-template-columns: repeat(2, 1fr); } }

    /* ---- Tab bar ---- */
    .tab-bar {
      display: flex; gap: 4px;
      margin-bottom: 18px;
    }

    .tab-btn {
      padding: 8px 20px;
      border: 1.5px solid #E2E8F0;
      background: white; color: #64748B;
      border-radius: 8px; font-size: 13px; font-weight: 500;
      cursor: pointer; transition: all 0.12s;
    }

    .tab-btn:hover { background: #F8FAFC; border-color: #CBD5E1; }
    .tab-btn.active { background: #2563EB; color: white; border-color: #2563EB; }

    /* ---- Filter bar ---- */
    .filter-bar {
      background: #FFFFFF; border-radius: 10px;
      border: 1px solid #E2E8F0; padding: 14px 18px;
      margin-bottom: 16px;
      display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-end;
    }

    .filter-group { display: flex; flex-direction: column; gap: 4px; }
    .filter-label { font-size: 11px; font-weight: 500; color: #64748B; }

    .filter-input {
      padding: 7px 11px;
      border: 1px solid #E2E8F0; border-radius: 7px;
      font-size: 13px; outline: none; min-width: 130px;
    }

    .filter-select {
      padding: 7px 11px;
      border: 1px solid #E2E8F0; border-radius: 7px;
      font-size: 13px; background: white; min-width: 130px;
    }

    /* ---- Ops form card ---- */
    .ops-card {
      background: #FFFFFF; border-radius: 12px;
      border: 1px solid #E2E8F0; padding: 24px;
      margin-bottom: 20px;
    }

    .ops-card-title {
      font-size: 14px; font-weight: 600; color: #0F172A;
      margin-bottom: 16px; padding-bottom: 12px;
      border-bottom: 1px solid #F1F5F9;
    }

    .ops-field-row {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 0; border-bottom: 1px solid #F8FAFC;
    }

    .ops-field-key {
      font-size: 13px; font-weight: 500; color: #374151;
      width: 220px; flex-shrink: 0;
    }

    .ops-field-input {
      flex: 1; padding: 7px 11px;
      border: 1px solid #E2E8F0; border-radius: 7px;
      font-size: 13px; outline: none;
      transition: border-color 0.12s;
    }

    .ops-field-input:focus { border-color: #93C5FD; }

    .form-row { display: flex; gap: 12px; }
    .form-row .form-group { flex: 1; }
  </style>
</head>

    // ============================================================
    // API helper
    // ============================================================
    async function api(path, options = {}) {
      try {
        const res = await fetch(path, {
          ...options,
          headers: {
            'Authorization': 'Bearer ' + token,
            'Content-Type': 'application/json',
            'Accept-Language': currentLang,
            ...(options.headers || {}),
          }
        });
        if (res.status === 401) { logout(); return null; }
        return res.json();
      } catch (err) {
        console.error('API error', path, err);
        return null;
      }
    }

    function logout() {
      localStorage.removeItem('cp_token');
      localStorage.removeItem('cp_role');
      localStorage.removeItem('cp_user');
      window.location.replace('/portal/login.html');

    function statusBadge(v) {

        completed: 'badge-green', failed: 'badge-yellow', cancelled: 'badge-red',
        needs_review: 'badge-red' };

        needs_review: '확인 필요' };
      return `<span class="badge ${m[v] || 'badge-gray'}">${labels[v] || v}</span>`;
    }

    function roleBadge(v) {
      const m = { cs: 'badge-blue', partner: 'badge-purple', customer: 'badge-gray' };
      return `<span class="badge ${m[v] || 'badge-gray'}">${v}</span>`;
    }

    function txStatusBadge(v) {
      const m = { Active: 'badge-green', Pending: 'badge-yellow', Stopped: 'badge-blue', Failed: 'badge-red' };
      return `<span class="badge ${m[v] || 'badge-gray'}">${v}</span>`;
    }

    function paymentStatusBadge(s) {
      const map = { pending: ['#F59E0B','#FEF3C7','미결제'], paid: ['#10B981','#D1FAE5','결제완료'], failed: ['#EF4444','#FEE2E2','결제실패'], cancelled: ['#6B7280','#F3F4F6','취소'], refunded: ['#8B5CF6','#EDE9FE','환불'] };
      const [c, bg, label] = map[s] || ['#6B7280','#F3F4F6', s || '-'];
      return `<span style="background:${bg};color:${c};padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;">${label}</span>`;
    }

    function faultStatusBadge(v) {
      const m = { Received: 'badge-yellow', InProgress: 'badge-orange', Resolved: 'badge-green' };
      return `<span class="badge ${m[v] || 'badge-gray'}">${t('fault.' + v) || v}</span>`;
    }

    function fmtDate(d) {
      if (!d) return '-';
      return new Date(d).toLocaleDateString('ko-KR', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
    }

    function getNestedVal(obj, key) {
      return key.split('.').reduce((o, k) => (o && o[k] !== undefined ? o[k] : null), obj);
    }

    // ============================================================
    // Pagination builder
    // ============================================================
    const pageState = {};

    function buildPagination(current, total, callbackStr) {
      if (total <= 1) return '';
      const pages = [];
      const start = Math.max(1, current - 2);
      const end = Math.min(total, current + 2);
      for (let i = start; i <= end; i++) pages.push(i);

      const btn = (p, label, disabled = false) =>
        `<button class="page-btn ${p === current ? 'active' : ''}" ${disabled ? 'disabled' : ''} onclick="${callbackStr}(${p})">${label}</button>`;

      return btn(1, '«', current === 1) +
        btn(current - 1, '‹', current === 1) +
        pages.map(p => btn(p, p)).join('') +
        btn(current + 1, '›', current === total) +
        btn(total, '»', current === total);
    }

        const usersTotal = d.users?.total ?? d.totalUsers ?? '-';
        const usersActive = d.users?.active ?? d.activeUsers ?? '-';
        const sessActive = d.sessions?.active ?? d.activeSessions ?? '-';
        const sessToday = d.sessions?.today ?? d.todaySessions ?? '-';

    async function loadDashboardStats(period) {
      ['daily', 'weekly', 'monthly'].forEach(p => {
        const btn = document.getElementById('statsTab_' + p);
        if (btn) btn.classList.toggle('active', p === period);
      });

      const card = document.getElementById('statsTableCard');
      if (!card) return;
      card.innerHTML = '<div class="loading-overlay"><div class="big-spinner"></div></div>';

      const data = await api('/api/portal/cs/dashboard/stats?period=' + period);
      if (!data) { card.innerHTML = '<div class="error-box" style="display:block">로드 실패</div>'; return; }

      const items = (data.success && Array.isArray(data.data)) ? data.data : [];
      const periodLabel = { daily: '날짜', weekly: '주', monthly: '월' }[period] || '기간';

      const rows = items.length === 0
        ? `<tr><td colspan="4" class="empty-state">${t('common.noData')}</td></tr>`
        : items.map(r => `<tr>
            <td>${r.label || '-'}</td>
            <td>${r.count != null ? r.count.toLocaleString() : '-'}</td>
            <td>${r.totalKwh != null ? r.totalKwh.toFixed(2) : '-'}</td>
            <td>${r.totalAmount != null ? Number(r.totalAmount).toLocaleString() : '-'}</td>
          </tr>`).join('');

      card.innerHTML = `
        <div class="table-toolbar">
          <span class="table-toolbar-title">서비스 현황 (${{ daily: t('menu.stats.daily'), weekly: t('menu.stats.weekly'), monthly: t('menu.stats.monthly') }[period]})</span>
        </div>
        <div style="overflow-x:auto">
          <table>
            <thead><tr><th>${periodLabel}</th><th>충전건수</th><th>충전량(kWh)</th><th>충전금액(원)</th></tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      `;
    }

    // ============================================================
    // 3-1. 파트너 관리
    // ============================================================
    async function loadPartners(page, keyword) {
      page = page || 1;
      keyword = keyword !== undefined ? keyword : (pageState.partners?.keyword || '');
      pageState.partners = { page, keyword };

      const url = `/api/portal/cs/partners?page=${page}&limit=20${keyword ? '&keyword=' + encodeURIComponent(keyword) : ''}`;
      const data = await api(url);
      if (!data) return;

      const items = data.data?.items || [];
      const total = data.data?.total || 0;
      const totalPages = data.data?.totalPages || 1;

      const tbody = items.length === 0
        ? `<tr><td colspan="7" class="empty-state">${t('common.noData')}</td></tr>`
        : items.map(r => `<tr>
            <td>${r.id}</td>
            <td>${r.businessName || '-'}</td>
            <td>${r.businessNo || '-'}</td>
            <td>${r.user?.username || '-'}</td>
            <td>${r.contactPhone || '-'}</td>
            <td>${statusBadge(r.user?.status)}</td>
            <td>${fmtDate(r.createdAt)}</td>
            <td>
              <button class="btn-sm" onclick="openPartnerDetail(${r.id})">${t('common.detail')}</button>
              ${r.user && r.user.status === 'pending' ? `<button class="btn-sm" style="margin-left:4px;background:#ECFDF5;color:#065F46;border-color:#A7F3D0" onclick="approvePartner(${r.id})">${t('common.approve')}</button>` : ''}
              <button class="btn-sm" style="margin-left:4px;background:#FEF2F2;color:#B91C1C;border-color:#FECACA" onclick="deletePartner(${r.id}, '${(r.businessName||'').replace(/'/g,"\\'")}')">삭제</button>
            </td>
          </tr>`).join('');

      const pagination = buildPagination(page, totalPages, 'loadPartners');

      setContent(`
        <div class="page-header">
          <div>
            <div class="page-title">${t('menu.partners')}</div>
            <div class="page-subtitle">전체 ${total}건</div>
          </div>
          <button class="btn-primary" onclick="openPartnerCreate()">+ 파트너 등록</button>
        </div>
        <div class="table-card">
          <div class="table-toolbar">
            <span class="table-toolbar-title">파트너 목록</span>
            <input class="search-input" id="partnerSearch" placeholder="아이디, 사업자명, 사업자번호 검색..." value="${keyword}" onkeydown="if(event.key==='Enter') loadPartners(1, this.value)">
          </div>
          <div style="overflow-x:auto">
            <table>
              <thead><tr><th>ID</th><th>사업자명</th><th>사업자번호</th><th>아이디</th><th>연락처</th><th>상태</th><th>등록일</th><th>액션</th></tr></thead>
              <tbody>${tbody}</tbody>
            </table>
          </div>
          <div class="pagination">
            <span class="pagination-info">총 ${total}건 / ${page}/${totalPages} 페이지</span>
            <div class="pagination-btns">${pagination}</div>
          </div>
        </div>
      `);
    }

      openModal(`

        <div style="font-size:13px;font-weight:600;color:#374151;margin-bottom:12px">계정 정보</div>

          <input class="form-input" id="pc_businessName" placeholder="사업자명 또는 법인명">

    async function submitPartnerCreate() {
      const username = document.getElementById('pc_username').value.trim();
      const password = document.getElementById('pc_password').value;
      const email = document.getElementById('pc_email').value.trim();
      const phone = document.getElementById('pc_phone').value.trim();
      const businessName = document.getElementById('pc_businessName').value.trim();
      const businessNo = document.getElementById('pc_businessNo').value.trim();
      const contactPhone = document.getElementById('pc_contactPhone').value.trim();

      if (!username) { alert('아이디를 입력하세요.'); return; }
      if (!password || password.length < 6) { alert('비밀번호는 6자 이상이어야 합니다.'); return; }
      if (!businessName) { alert('사업자명을 입력하세요.'); return; }

      const body = {
        username,
        password,
        email: email || undefined,
        phone: phone || undefined,
        business_name: businessName,
        business_no: businessNo || undefined,
        contact_phone: contactPhone || undefined,
      };

      const data = await api('/api/portal/cs/partners', { method: 'POST', body: JSON.stringify(body) });
      if (data && data.success) {
        closeModal();
        loadPartners(1, '');
        alert('파트너가 등록되었습니다. 승인 후 로그인 가능합니다.');
      } else {
        alert((data && data.error && data.error.message) || '등록 실패');
      }
    }

    async function approvePartner(id) {
      if (!confirm('이 파트너를 승인하시겠습니까?')) return;
      const data = await api(`/api/portal/cs/partners/${id}/approve`, { method: 'PATCH' });
      if (data && data.success) { loadPartners(pageState.partners?.page || 1, pageState.partners?.keyword || ''); }
      else { alert((data && data.error && data.error.message) || '승인 실패'); }
    }

    async function deletePartner(id, name) {
      if (!confirm(`파트너 "${name}"을(를) 삭제하시겠습니까?\n\n⚠️ 정산 기록이 있는 경우 삭제할 수 없습니다.`)) return;
      const data = await api(`/api/portal/cs/partners/${id}`, { method: 'DELETE' });
      if (data && data.success) {
        loadPartners(pageState.partners?.page || 1, pageState.partners?.keyword || '');
      } else {
        const msg = data?.error?.message || '삭제 실패';
        alert(msg);
      }
    }

    async function openPartnerDetail(id) {
      const data = await api(`/api/portal/cs/partners/${id}`);
      if (!data || !data.success) return;
      const p = data.data;

      openModal(`
        <div class="modal-title">파트너 상세: ${p.businessName}</div>
        <div class="modal-tab-bar">
          <button class="modal-tab-btn active" onclick="switchModalTab('pd_info')">기본정보</button>
          <button class="modal-tab-btn" onclick="switchModalTab('pd_rebate')">충전소별 리베이트</button>
          <button class="modal-tab-btn" onclick="switchModalTab('pd_tx')">충전이력</button>
        </div>

        <div class="modal-tab-pane active" id="pd_info">
          <div class="form-row">
            <div class="form-group"><label class="form-label">사업자명</label><input class="form-input" id="pf_businessName" value="${p.businessName || ''}"></div>
            <div class="form-group"><label class="form-label">사업자번호</label><input class="form-input" id="pf_businessNo" value="${p.businessNo || ''}"></div>
          </div>
          <div class="form-row">
            <div class="form-group"><label class="form-label">담당자 연락처</label><input class="form-input" id="pf_contactPhone" value="${p.contactPhone || ''}"></div>
            <div class="form-group"><label class="form-label">마진율 (%)</label><input class="form-input" type="number" id="pf_marginRate" value="${p.marginRate || 0}"></div>
          </div>
          <div class="form-row">
            <div class="form-group"><label class="form-label">${t('partnerDetail.settlementSchedule')}</label>
              <select class="form-select" id="pf_settlementSchedule" onchange="onSettlementScheduleChange()">
                <option value="daily" ${(p.settlementSchedule||'monthly')==='daily'?'selected':''}>${t('partnerDetail.scheduleDaily')}</option>
                <option value="weekly" ${(p.settlementSchedule||'monthly')==='weekly'?'selected':''}>${t('partnerDetail.scheduleWeekly')}</option>
                <option value="monthly" ${(p.settlementSchedule||'monthly')==='monthly'?'selected':''}>${t('partnerDetail.scheduleMonthly')}</option>
              </select>
            </div>
            <div class="form-group"><label class="form-label">${t('partnerDetail.settlementDay')}</label>
              <div id="pf_settlementDayContainer"></div>
            </div>
          </div>
          <div style="font-size:13px;font-weight:600;color:#374151;margin:12px 0 8px">계좌정보</div>
          <div class="form-row">
            <div class="form-group"><label class="form-label">은행명</label><input class="form-input" id="pf_bankName" value="${p.bankName || ''}"></div>
            <div class="form-group"><label class="form-label">계좌번호</label><input class="form-input" id="pf_bankAccount" value="${p.bankAccount || ''}"></div>
          </div>
          <div class="form-group"><label class="form-label">예금주</label><input class="form-input" id="pf_bankHolder" value="${p.bankAccountHolder || ''}"></div>
          <div class="modal-footer">
            <button class="btn-cancel" onclick="closeModal()">닫기</button>
            <button class="btn-primary" onclick="savePartnerInfo(${id})">저장</button>
          </div>
        </div>

        <div class="modal-tab-pane" id="pd_rebate">
          <div id="rebateTableArea"><div class="loading-overlay"><div class="big-spinner"></div></div></div>
        </div>

        <div class="modal-tab-pane" id="pd_tx">
          <div id="partnerTxArea"><div class="loading-overlay"><div class="big-spinner"></div></div></div>
        </div>
      `);

      // Settlement field cache + initial render
      window._pfSettlementCache = {
        schedule: p.settlementSchedule || 'monthly',
        day: (typeof p.settlementDay === 'number') ? p.settlementDay : null,
        dayOfWeek: (typeof p.settlementDayOfWeek === 'number') ? p.settlementDayOfWeek : null,
      };
      renderSettlementDayField(
        window._pfSettlementCache.schedule,
        window._pfSettlementCache.day,
        window._pfSettlementCache.dayOfWeek
      );

      // Pre-load rebate tab
      loadPartnerRebateTab(id, p.chargingSites || []);
      loadPartnerTxTab(id, 1);
    }

    function renderSettlementDayField(schedule, day, dayOfWeek) {
      const c = document.getElementById('pf_settlementDayContainer');
      if (!c) return;
      if (schedule === 'daily') {
        c.innerHTML = `<input class="form-input" type="text" id="pf_settlementDay" disabled placeholder="${t('partnerDetail.everyDay')}" value="">`;
      } else if (schedule === 'weekly') {
        let opts = `<option value="">--</option>`;
        for (let i = 1; i <= 5; i++) {
          const sel = (dayOfWeek === i) ? ' selected' : '';
          opts += `<option value="${i}"${sel}>${t('partnerDetail.weekday' + i)}</option>`;
        }
        c.innerHTML = `<select class="form-select" id="pf_settlementDayOfWeek">${opts}</select>`;
      } else {
        // monthly
        let opts = `<option value="">--</option>`;
        for (let i = 1; i <= 31; i++) {
          const sel = (Number(day) === i) ? ' selected' : '';
          opts += `<option value="${i}"${sel}>${i}</option>`;
        }
        c.innerHTML = `<select class="form-select" id="pf_settlementDay">${opts}</select>`;
      }
    }

    function onSettlementScheduleChange() {
      const sel = document.getElementById('pf_settlementSchedule');
      if (!sel) return;
      const schedule = sel.value;
      const cache = window._pfSettlementCache || { day: null, dayOfWeek: null };
      cache.schedule = schedule;
      renderSettlementDayField(schedule, cache.day, cache.dayOfWeek);
    }

    async function savePartnerInfo(id) {
      const basicBody = {
        business_name: document.getElementById('pf_businessName').value.trim(),
        business_no: document.getElementById('pf_businessNo').value.trim() || undefined,
        contact_phone: document.getElementById('pf_contactPhone').value.trim() || undefined,
      };
      const marginBody = {
        margin_rate: Number(document.getElementById('pf_marginRate').value),
      };
      const settlementSchedule = document.getElementById('pf_settlementSchedule')?.value;
      const bankBody = {
        bank_name: document.getElementById('pf_bankName').value.trim(),
        bank_account: document.getElementById('pf_bankAccount').value.trim(),
        bank_account_holder: document.getElementById('pf_bankHolder').value.trim(),
      };

      if (!basicBody.business_name) { alert('사업자명을 입력하세요.'); return; }

      const [r1] = await Promise.all([
        api(`/api/portal/cs/partners/${id}`, { method: 'PUT', body: JSON.stringify(basicBody) }),
        api(`/api/portal/cs/partners/${id}/margin`, { method: 'PATCH', body: JSON.stringify(marginBody) }),
      ]);

      // 정산주기 + 정산일을 한 번의 PATCH로 보낸다.
      if (settlementSchedule) {
        let settlement_day = null;
        let day_of_week = null;
        if (settlementSchedule === 'monthly') {
          const sel = document.getElementById('pf_settlementDay');
          const v = sel && sel.value ? Number(sel.value) : null;
          if (v && v >= 1 && v <= 31) settlement_day = v;
        } else if (settlementSchedule === 'weekly') {
          const sel = document.getElementById('pf_settlementDayOfWeek');
          const v = sel && sel.value ? Number(sel.value) : null;
          if (v && v >= 1 && v <= 5) day_of_week = v;
        }
        const sr = await api(`/api/portal/cs/partners/${id}/settlement-schedule`, {
          method: 'PATCH',
          body: JSON.stringify({ schedule: settlementSchedule, settlement_day, day_of_week }),
        });
        if (!sr || !sr.success) {
          alert((sr && sr.error && sr.error.message) || '정산정보 저장 실패');
          return;
        }
      }

      if (bankBody.bank_name || bankBody.bank_account) {
        await api(`/api/portal/cs/partners/${id}/bank-account`, { method: 'PUT', body: JSON.stringify(bankBody) }).catch(() => {});
      }

      if (r1 && r1.success) {
        closeModal();
        loadPartners(pageState.partners?.page || 1, pageState.partners?.keyword || '');
      } else {
        alert((r1 && r1.error && r1.error.message) || '저장 실패');
      }
    }

    async function loadPartnerRebateTab(partnerId, existingSites) {
      const area = document.getElementById('rebateTableArea');
      if (!area) return;

      // Fetch sites with totals
      const sitesData = await api(`/api/portal/cs/sites?partnerId=${partnerId}&limit=100`);
      const sites = sitesData?.data?.items || existingSites || [];

      if (sites.length === 0) {
        area.innerHTML = `<div class="empty-state">${t('common.noData')}</div>`;
        return;
      }

      const rows = sites.map(s => `
        <tr>
          <td>${s.siteName || '-'}</td>
          <td>${s._count?.chargingStations ?? s.chargingStations?.length ?? 0}대</td>
          <td><span id="rebate_amount_${s.id}">-</span></td>
          <td>
            <input type="number" style="width:80px;padding:4px 8px;border:1px solid #E2E8F0;border-radius:6px;font-size:12px;"
              id="rebateRate_${s.id}" value="${Number(s.rebateRate || 0).toFixed(2)}" min="0" max="100" step="0.01">
          </td>
          <td><span id="rebate_calc_${s.id}">-</span></td>
          <td><button class="btn-sm" onclick="saveRebateRate(${partnerId}, ${s.id})">저장</button></td>
        </tr>
      `).join('');

      area.innerHTML = `
        <table>
          <thead><tr><th>충전소명</th><th>충전기수</th><th>총충전금액(원)</th><th>리베이트율(%)</th><th>리베이트금액(원)</th><th>액션</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      `;

      // Load settlement totals per site async
      for (const s of sites) {
        const amtEl = document.getElementById('rebate_amount_' + s.id);
        const calcEl = document.getElementById('rebate_calc_' + s.id);
        const rateEl = document.getElementById('rebateRate_' + s.id);
        const txData = await api(`/api/portal/cs/sites/${s.id}/transactions?limit=1`);
        const totalTx = txData?.data?.total || 0;
        // Approximate total amount (no direct API for this; show tx count for now)
        if (amtEl) amtEl.textContent = totalTx + '건';
        if (calcEl && rateEl) {
          const rate = Number(rateEl.value) || 0;
          calcEl.textContent = '(' + rate + '%)';
        }
      }
    }

    async function saveRebateRate(partnerId, siteId) {
      const rateEl = document.getElementById('rebateRate_' + siteId);
      if (!rateEl) return;
      const rebateRate = Number(rateEl.value);
      const data = await api(`/api/portal/cs/partners/${partnerId}/sites/${siteId}/rebate`, {
        method: 'PATCH',
        body: JSON.stringify({ rebateRate }),
      });
      if (data && data.success) {
        rateEl.style.borderColor = '#10B981';
        setTimeout(() => { if (rateEl) rateEl.style.borderColor = ''; }, 1500);
      } else {
        alert((data && data.error && data.error.message) || '저장 실패');
      }
    }

    async function loadPartnerTxTab(partnerId, page) {
      const area = document.getElementById('partnerTxArea');
      if (!area) return;
      area.innerHTML = '<div class="loading-overlay"><div class="big-spinner"></div></div>';

      const data = await api(`/api/portal/cs/partners/${partnerId}/transactions?page=${page}&limit=10`);
      if (!data) { area.innerHTML = '<div class="error-box" style="display:block">로드 실패</div>'; return; }

      const items = data.data?.items || [];
      const total = data.data?.total || 0;
      const totalPages = data.data?.totalPages || 1;

      const rows = items.length === 0
        ? `<tr><td colspan="6" class="empty-state">${t('common.noData')}</td></tr>`
        : items.map(r => `<tr>
            <td>${fmtDate(r.timeStart)}</td>
            <td>${r.station?.site?.siteName || '-'}</td>
            <td>${r.stationId || '-'}</td>
            <td>${r.meterEnd != null && r.meterStart != null ? ((r.meterEnd - r.meterStart) / 1000).toFixed(2) : '-'}</td>
            <td>${r.costKrw != null ? Number(r.costKrw).toLocaleString() + '원' : '-'}</td>
            <td>${txStatusBadge(r.status)}</td>
          </tr>`).join('');

      const pager = buildPagination(page, totalPages, `(p) => loadPartnerTxTab(${partnerId}, p)`);

      area.innerHTML = `
        <table>
          <thead><tr><th>충전일시</th><th>충전소</th><th>충전기ID</th><th>kWh</th><th>금액</th><th>상태</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
        <div class="pagination" style="border-top:1px solid #F1F5F9; padding:10px 0 0;">
          <span class="pagination-info">총 ${total}건</span>
          <div class="pagination-btns">${pager}</div>
        </div>
      `;
    }

    // ============================================================
    // 3-2. 충전소 관리
    // ============================================================
    async function loadSites(page, keyword) {
      page = page || 1;
      keyword = keyword !== undefined ? keyword : (pageState.sites?.keyword || '');
      pageState.sites = { page, keyword };

      const url = `/api/portal/cs/sites?page=${page}&limit=20${keyword ? '&keyword=' + encodeURIComponent(keyword) : ''}`;
      const data = await api(url);
      if (!data) return;

      const items = data.data?.items || [];
      const total = data.data?.total || 0;
      const totalPages = data.data?.totalPages || 1;

      const tbody = items.length === 0
        ? `<tr><td colspan="8" class="empty-state">${t('common.noData')}</td></tr>`
        : items.map(r => `<tr>
            <td>${r.id}</td>
            <td>${r.siteName || '-'}</td>
            <td>${r.partner?.businessName || '-'}</td>
            <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${r.address || '-'}</td>
            <td>${r.chargingStations?.length || 0}대</td>
            <td>${r.unitPrice ? Number(r.unitPrice).toLocaleString() : '-'}</td>
            <td>${fmtDate(r.createdAt)}</td>

      if (data && data.success) { loadUserCardsTab(userId); }
      else { alert((data && data.error && data.error.message) || '삭제 실패'); }
    }

    // ============================================================
    // 3-4. 충전기 관리
    // ============================================================
    async function loadStations(page, keyword, limit) {
      page = page || 1;
      keyword = keyword !== undefined ? keyword : (pageState.stations?.keyword || '');
      limit = limit || pageState.stations?.limit || 20;
      pageState.stations = { page, keyword, limit };

      const url = `/api/portal/cs/stations?page=${page}&limit=${limit}${keyword ? '&keyword=' + encodeURIComponent(keyword) : ''}`;
      const data = await api(url);
      if (!data) return;

      const items = data.data?.items || [];
      const total = data.data?.total || 0;
      const totalPages = data.data?.totalPages || 1;

      const tbody = items.length === 0
        ? `<tr><td colspan="9" class="empty-state">${t('common.noData')}</td></tr>`
        : items.map(r => `<tr>
            <td>${r.id}</td>
            <td>${r.site?.siteName || '-'}</td>
            <td>${r.manufacturer || r.vendorName || '-'}</td>
            <td>${r.serialNumber || '-'}</td>
            <td>${r.firmwareVersion || '-'}</td>
            <td>${statusBadge(r.status)}</td>
            <td>${fmtDate(r.lastHeartbeatAt)}</td>
            <td>${r.todayKwh != null ? r.todayKwh.toFixed(2) : '0.00'}</td>
            <td>
              <button class="btn-sm" onclick="openStationDetail('${r.id}')">${t('common.detail')}</button>
              <button class="btn-sm" onclick="openStationEdit('${r.id}')">수정</button>
              <button class="btn-sm" style="margin-left:4px;background:#FEF2F2;color:#B91C1C;border-color:#FECACA" onclick="deleteStation('${r.id}')">삭제</button>
            </td>
          </tr>`).join('');

      const pagination = buildPagination(page, totalPages, `(p) => loadStations(p, pageState.stations?.keyword, pageState.stations?.limit)`);

      setContent(`
        <div class="page-header">
          <div>
            <div class="page-title">${t('menu.stations')}</div>
            <div class="page-subtitle">전체 ${total}건</div>
          </div>
          <button class="btn-primary" onclick="openCreateStationModal()">+ 충전기 등록</button>
        </div>
        <div class="table-card">
          <div class="table-toolbar">
            <span class="table-toolbar-title">충전기 목록</span>
            <input class="search-input" id="stationSearch" placeholder="충전기ID, 충전소명, 제조사, 시리얼, 펌웨어 검색..." value="${keyword}" onkeydown="if(event.key==='Enter') loadStations(1, this.value)">
            <select class="filter-select" style="width:90px;margin-left:8px" onchange="loadStations(1, document.getElementById('stationSearch').value, Number(this.value))">
              <option value="20" ${limit==20?'selected':''}>20개</option>
              <option value="50" ${limit==50?'selected':''}>50개</option>
              <option value="100" ${limit==100?'selected':''}>100개</option>
            </select>
          </div>
          <div style="overflow-x:auto">
            <table>
              <thead><tr><th>충전기ID</th><th>충전소</th><th>제조사</th><th>시리얼번호</th><th>펌웨어</th><th>상태</th><th>마지막연결</th><th>오늘충전(kWh)</th><th>액션</th></tr></thead>
              <tbody>${tbody}</tbody>
            </table>
          </div>
          <div class="pagination">
            <span class="pagination-info">총 ${total}건 / ${page}/${totalPages} 페이지</span>
            <div class="pagination-btns">${pagination}</div>
          </div>
        </div>
      `);
    }

    async function saveStationUpdate(id) {
      const body = {
        manufacturer: document.getElementById('stf_manufacturer').value,
        serialNumber: document.getElementById('stf_serialNumber').value,
        firmwareVersion: document.getElementById('stf_firmware').value,
        isActive: document.getElementById('stf_isActive').value === 'true',
      };
      const data = await api(`/api/portal/cs/stations/${id}`, { method: 'PUT', body: JSON.stringify(body) });
      if (data && data.success) { closeModal(); loadStations(pageState.stations?.page || 1, pageState.stations?.keyword || ''); }
      else { alert((data && data.error && data.error.message) || '저장 실패'); }
    }

          <button class="btn-cancel" onclick="closeModal()">취소</button>

    async function saveStationEdit(id) {
      const siteIdVal = document.getElementById('se_siteId').value;
      const body = {
        siteId: siteIdVal ? Number(siteIdVal) : null,
        manufacturer: document.getElementById('se_manufacturer').value.trim() || undefined,
        modelName: document.getElementById('se_modelName').value.trim() || undefined,
        serialNumber: document.getElementById('se_serialNumber').value.trim() || undefined,
        firmwareVersion: document.getElementById('se_firmware').value.trim() || undefined,
        isActive: document.getElementById('se_isActive').value === 'true',
      };
      const data = await api(`/api/portal/cs/stations/${id}`, { method: 'PUT', body: JSON.stringify(body) });
      if (data && data.success) { closeModal(); loadStations(pageState.stations?.page || 1, pageState.stations?.keyword || ''); }
      else { alert((data && data.error && data.error.message) || '저장 실패'); }
    }

    async function deleteStation(id) {
      if (!confirm(`충전기 "${id}"을(를) 비활성화 처리하시겠습니까?\n\n⚠️ 진행 중인 충전 세션이 있는 경우 처리할 수 없습니다.`)) return;
      const data = await api(`/api/portal/cs/stations/${id}`, { method: 'DELETE' });
      if (data && data.success) {
        loadStations(pageState.stations?.page || 1, pageState.stations?.keyword || '');
      } else {
        const msg = data?.error?.message || '처리 실패';
        alert(msg);
      }
    }

    async function openCreateStationModal() {
      // 충전소 목록 로드
      const sitesData = await api('/api/portal/cs/sites?page=1&limit=200');
      const sites = sitesData?.data?.items || [];
      const siteOptions = `<option value="">-- 충전소 선택 (선택사항) --</option>` +
        sites.map(s => `<option value="${s.id}">${s.siteName}</option>`).join('');

      openModal(`
        <div class="modal-title">충전기 등록</div>
        <div class="form-group">
          <label class="form-label">충전기 ID <span style="color:#EF4444">*</span></label>
          <input class="form-input" id="cst_id" placeholder="EN0000001 (EN + 7자리 숫자)">
        </div>
        <div class="form-group">
          <label class="form-label">충전소</label>
          <select class="form-select" id="cst_siteId">${siteOptions}</select>
        </div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">제조사</label><input class="form-input" id="cst_manufacturer" placeholder="제조사명"></div>
          <div class="form-group"><label class="form-label">시리얼번호</label><input class="form-input" id="cst_serialNumber" placeholder="시리얼번호"></div>
        </div>
        <div class="form-group">
          <label class="form-label">펌웨어 버전</label>
          <input class="form-input" id="cst_firmware" placeholder="예: 1.0.0">

        <div class="modal-footer">
          <button class="btn-cancel" onclick="closeModal()">취소</button>
          <button class="btn-primary" onclick="createStation()">등록</button>
        </div>
      `);
    }

    async function createStation() {
      const id = document.getElementById('cst_id').value.trim();
      if (!id) { alert('충전기 ID를 입력하세요.'); return; }
      if (!/^EN\d{7}$/.test(id)) { alert('충전기 ID는 EN + 7자리 숫자 형식이어야 합니다. (예: EN0000001)'); return; }
      const siteIdVal = document.getElementById('cst_siteId').value;
      const body = {
        id,
        siteId: siteIdVal ? Number(siteIdVal) : undefined,
        manufacturer: document.getElementById('cst_manufacturer').value.trim() || undefined,
        serialNumber: document.getElementById('cst_serialNumber').value.trim() || undefined,
        firmwareVersion: document.getElementById('cst_firmware').value.trim() || undefined,
      };
      const data = await api('/api/portal/cs/stations', { method: 'POST', body: JSON.stringify(body) });
      if (data && data.success) { closeModal(); loadStations(1, ''); }
      else { alert((data && data.error && data.error.message) || '등록 실패'); }
    }

    async function loadStationTxTab(stationId, page) {
      const area = document.getElementById('stationTxArea');
      if (!area) return;
      area.innerHTML = '<div class="loading-overlay"><div class="big-spinner"></div></div>';

      const data = await api(`/api/portal/cs/stations/${stationId}/transactions?page=${page}&limit=10`);
      if (!data) { area.innerHTML = '<div class="error-box" style="display:block">로드 실패</div>'; return; }

      const items = data.data?.items || [];
      const total = data.data?.total || 0;
      const totalPages = data.data?.totalPages || 1;

      const rows = items.length === 0
        ? `<tr><td colspan="5" class="empty-state">${t('common.noData')}</td></tr>`
        : items.map(r => `<tr>
            <td>${fmtDate(r.timeStart)}</td>
            <td>${r.connectorId || '-'}</td>
            <td>${r.meterEnd != null && r.meterStart != null ? ((r.meterEnd - r.meterStart) / 1000).toFixed(2) : '-'}</td>
            <td>${r.costKrw != null ? Number(r.costKrw).toLocaleString() + '원' : '-'}</td>
            <td>${txStatusBadge(r.status)}</td>
          </tr>`).join('');

      area.innerHTML = `
        <table>
          <thead><tr><th>충전일시</th><th>커넥터</th><th>kWh</th><th>금액</th><th>상태</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
        <div class="pagination" style="border-top:1px solid #F1F5F9; padding:10px 0 0;">
          <span class="pagination-info">총 ${total}건</span>
          <div class="pagination-btns">${buildPagination(page, totalPages, `(p) => loadStationTxTab('${stationId}', p)`)}</div>
        </div>
      `;
    }

    async function loadStationFaultTab(stationId, page) {

          <tbody>${rows}</tbody>

        <div class="pagination" style="border-top:1px solid #F1F5F9; padding:10px 0 0;">
          <span class="pagination-info">총 ${total}건</span>
          <div class="pagination-btns">${buildPagination(page, totalPages, `(p) => loadStationFaultTab('${stationId}', p)`)}</div>
        </div>

    // ============================================================
    // 3-5. 충전카드 관리
    // ============================================================
    async function loadIdTokens(page, keyword) {
      page = page || 1;
      keyword = keyword !== undefined ? keyword : (pageState.idtokens?.keyword || '');
      pageState.idtokens = { page, keyword };

      const url = `/api/portal/cs/id-tokens?page=${page}&limit=20${keyword ? '&keyword=' + encodeURIComponent(keyword) : ''}`;
      const data = await api(url);
      if (!data) return;

      const items = data.data?.items || [];
      const total = data.data?.total || 0;
      const totalPages = data.data?.totalPages || 1;

      const statusMap = { Accepted: 'badge-green', Blocked: 'badge-red', Expired: 'badge-gray', Invalid: 'badge-gray', ConcurrentTx: 'badge-yellow' };

      const tbody = items.length === 0
        ? `<tr><td colspan="9" class="empty-state">${t('common.noData')}</td></tr>`
        : items.map(r => `<tr>
            <td>${r.id}</td>
            <td style="font-family:monospace">${r.idTag || '-'}</td>
            <td>${r.type || '-'}</td>
            <td><span class="badge ${statusMap[r.status] || 'badge-gray'}">${r.status}</span></td>
            <td>${r.user?.username || '-'}</td>
            <td>${r.in_use ? '<span class="badge badge-green">사용중</span>' : '<span class="badge badge-gray">미사용</span>'}</td>
            <td>${fmtDate(r.expiryDate) !== '-' ? fmtDate(r.expiryDate) : '-'}</td>
            <td>${fmtDate(r.createdAt)}</td>
            <td>
              <button class="btn-sm" onclick="openIdTokenDetail(${r.id})">${t('common.detail')}</button>
              ${r.in_use ? `<button class="btn-sm" style="background:#F59E0B;color:#fff;margin-left:4px" onclick="releaseIdTokenInUse(${r.id}, '${r.idTag}')">사용 해제</button>` : ''}
              <button class="btn-sm" style="background:#EF4444;color:#fff;margin-left:4px" onclick="deleteIdToken(${r.id}, '${r.idTag}')">삭제</button>
            </td>
          </tr>`).join('');

      const pagination = buildPagination(page, totalPages, `(p) => loadIdTokens(p, pageState.idtokens?.keyword)`);

      setContent(`
        <div class="page-header">
          <div>
            <div class="page-title">${t('menu.rfidCards')}</div>
            <div class="page-subtitle">전체 ${total}건</div>
          </div>
          <div style="display:flex;gap:8px">
            <button class="btn-secondary" onclick="downloadSampleCsv()">예제 CSV</button>
            <button class="btn-secondary" onclick="openBulkUpload()">CSV 일괄등록</button>
            <button class="btn-primary" onclick="openIdTokenCreate()">+ 카드 추가</button>
          </div>
        </div>
        <div class="table-card">
          <div class="table-toolbar">
            <span class="table-toolbar-title">충전카드 목록</span>
            <input class="search-input" id="idTokenSearch" placeholder="RFID 번호, 사용자ID 검색..." value="${keyword}" onkeydown="if(event.key==='Enter') loadIdTokens(1, this.value)">
          </div>
          <div style="overflow-x:auto">
            <table>
              <thead><tr><th>ID</th><th>RFID 번호</th><th>타입</th><th>상태</th><th>사용자</th><th>이용중</th><th>만료일</th><th>등록일</th><th>액션</th></tr></thead>
              <tbody>${tbody}</tbody>
            </table>
          </div>
          <div class="pagination">
            <span class="pagination-info">총 ${total}건 / ${page}/${totalPages} 페이지</span>
            <div class="pagination-btns">${pagination}</div>
          </div>
        </div>
      `);
    }

    async function releaseIdTokenInUse(id, idTag) {
      if (!confirm(`"${idTag}" 카드의 사용중 상태를 강제 해제하시겠습니까?\n\n※ 실제 충전 중인 경우 충전기에서는 계속 충전될 수 있습니다. 충전기 상태를 반드시 확인하세요.`)) return;
      const data = await api(`/api/portal/cs/id-tokens/${id}/release`, { method: 'PATCH' });
      if (data && data.success) {
        alert(data.data?.message || '사용중 상태가 해제되었습니다.');
        loadIdTokens(pageState.idtokens?.page || 1, pageState.idtokens?.keyword);
      } else {
        alert((data && data.error && data.error.message) || '해제 실패');
      }
    }

    async function deleteIdToken(id, idTag) {
      if (!confirm(`충전카드 "${idTag}"를 삭제하시겠습니까?`)) return;
      const data = await api(`/api/portal/cs/id-tokens/${id}`, { method: 'DELETE' });
      if (data && data.success) { loadIdTokens(pageState.idtokens?.page || 1, pageState.idtokens?.keyword); }
      else { alert((data && data.error && data.error.message) || '삭제 실패'); }
    }

    async function downloadSampleCsv() {
      const res = await fetch('/api/portal/cs/id-tokens/sample-csv', {
        headers: { 'Authorization': 'Bearer ' + localStorage.getItem('cp_token') }
      });
      if (!res.ok) {
        alert('예제 CSV 다운로드에 실패했습니다.');
        return;
      }
      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'idtoken_sample.csv';
      a.click();
      URL.revokeObjectURL(url);
    }

    function openBulkUpload() {
      openModal(`
        <div class="modal-title">충전카드 CSV 일괄등록</div>
        <div class="form-group">

      const fileInput = document.getElementById('bulkCsvFile');
      if (!fileInput.files || !fileInput.files[0]) { alert('파일을 선택하세요.'); return; }
      const formData = new FormData();
      formData.append('file', fileInput.files[0]);
      try {
        const resp = await fetch('/api/portal/cs/id-tokens/bulk-upload', { method: 'POST', body: formData });
        const result = await resp.json();
        if (result.success) {
          closeModal();
          alert(`등록 완료: ${result.data.created}건 추가, ${result.data.skipped}건 건너뜀`);
          loadIdTokens(1);
        } else {
          alert((result.error && result.error.message) || '업로드 실패');
        }
      } catch { alert('업로드 중 오류가 발생했습니다.'); }
    }

      const startDate = document.getElementById('sett_startDate')?.value;
      const endDate = document.getElementById('sett_endDate')?.value;

      if (siteId) params.set('siteId', siteId);
      if (startDate) params.set('startDate', startDate);

        </div>

    async function submitManualSettlement() {
      const partnerId = document.getElementById('ms_partnerId')?.value;
      const periodStart = document.getElementById('ms_periodStart')?.value;
      const periodEnd = document.getElementById('ms_periodEnd')?.value;
      const note = document.getElementById('ms_note')?.value;
      if (!partnerId || !periodStart || !periodEnd) { alert('파트너와 기간을 입력하세요.'); return; }
      const data = await api('/api/portal/cs/settlements/manual', {
        method: 'POST',
        body: JSON.stringify({ partnerId: Number(partnerId), periodStart, periodEnd, note }),
      });
      if (data && data.success) {
        // Phase L: data.data는 Settlement[] 배열 (marginRate 그룹별 1건씩)
        const settlements = Array.isArray(data.data) ? data.data : [data.data];
        const completed = settlements.filter(s => s && s.status === 'completed').length;
        const failed = settlements.filter(s => s && s.status === 'failed').length;
        let msg = `정산 ${settlements.length}건 생성 완료.`;
        if (completed > 0) msg += ` 송금 성공: ${completed}건.`;
        if (failed > 0) msg += ` 송금 실패: ${failed}건 (재시도 필요).`;
        alert(msg);
        closeModal();
        loadSettlements('byPartner');
      } else {
        const errCode = data && data.error && data.error.code;
        const errMsg = data && data.error && data.error.message;
        if (errCode === 'EMPTY_SETTLEMENT' || errCode === 'BAD_REQUEST') {
          alert(errMsg || '해당 기간에 정산할 거래가 없습니다');
        } else {
          alert(errMsg || '정산 생성 실패');
        }
      }
    }

    function _activeSettlementTab() {
      // Extracts the tab key from the active tab button's onclick attribute
      // e.g. onclick="loadSettlements('byPartner')" → 'byPartner'
      const btn = document.querySelector('.tab-btn.active');
      if (!btn) return 'all';
      const m = (btn.getAttribute('onclick') || '').match(/loadSettlements\('(\w+)'\)/);
      return m ? m[1] : 'all';
    }

    async function settlementMarkCompleted(settlementId) {
      const paidAmount = prompt('실제 송금 완료 금액 (VND, 숫자만):');
      if (paidAmount === null) return;
      const amount = parseInt(paidAmount.replace(/,/g, ''), 10);
      if (isNaN(amount) || amount < 0) { alert('유효한 금액을 입력하세요.'); return; }
      const transferRef = prompt('MB Bank 발급 거래번호:');
      if (!transferRef || !transferRef.trim()) { alert('거래번호를 입력하세요.'); return; }
      try {
        const res = await fetch(`/api/portal/cs/settlements/${settlementId}/mark-completed`, {
          method: 'POST', credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ paidAmount: amount, transferRef: transferRef.trim() }),
        });
        const data = await res.json();
        if (data.success) {
          alert('수동 완료 처리됨 — 정산 상태가 completed로 변경되었습니다.');
          doLoadSettlements(_activeSettlementTab());
        } else {
          alert(`처리 실패: ${data.error?.message || 'unknown'}`);
        }
      } catch (e) { alert(`오류: ${e.message}`); }
    }

    async function settlementRelease(settlementId) {
      if (!confirm('실패를 확정하고 거래 link를 해제합니다. 다음 cron에서 자동 재시도됩니다. 계속하시겠습니까?')) return;
      try {
        const res = await fetch(`/api/portal/cs/settlements/${settlementId}/mark-failed`, {
          method: 'POST', credentials: 'include',
        });
        const data = await res.json();
        if (data.success) {
          alert('실패 확정 완료 — 거래 link가 해제되었습니다. 다음 cron에서 자동 재시도됩니다.');
          doLoadSettlements(_activeSettlementTab());
        } else {
          alert(`처리 실패: ${data.error?.message || 'unknown'}`);
        }
      } catch (e) { alert(`오류: ${e.message}`); }
    }

    async function loadTransactions(page, filters) {
      page = page || 1;
      filters = filters || pageState.txFilters || {};
      pageState.txFilters = filters;

      const partnersData = await api('/api/portal/cs/partners?limit=200');
      const partners = partnersData?.data?.items || [];
      const partnerOptions = partners.map(p => `<option value="${p.id}" ${filters.partnerId == p.id ? 'selected' : ''}>${p.businessName}</option>`).join('');

      const sitesUrl = filters.partnerId ? `/api/portal/cs/sites?partnerId=${filters.partnerId}&limit=200` : '/api/portal/cs/sites?limit=200';
      const sitesData = await api(sitesUrl);

    function buildSiteGroups(sites, stations) {
      const map = new Map();
      // 1) 전체 충전소를 먼저 그룹으로 등록 (충전기가 없어도 보이도록)
      for (const site of sites) {
        const siteId = String(site.id);
        map.set(siteId, { siteId, siteName: site.siteName || '(이름없음)', stations: [] });
      }
      // 2) 각 충전기를 자신의 충전소 그룹에 배치
      for (const s of stations) {
        const siteId = s.site?.id != null ? String(s.site.id) : '__none__';
        if (!map.has(siteId)) {
          // sites 응답에 없는 미배정/누락 충전소는 별도 그룹으로
          map.set(siteId, { siteId, siteName: s.site?.siteName || '(미배정)', stations: [] });
        }
        map.get(siteId).stations.push(s);
      }
      // 3) 그룹 안의 충전기는 id 가나다순
      for (const g of map.values()) g.stations.sort((a, b) => a.id.localeCompare(b.id));
      return Array.from(map.values()).sort((a, b) => a.siteName.localeCompare(b.siteName, 'ko'));
    }

    function buildStationOptionsForSite(siteId) {
      const group = currentSiteGroups.find(g => g.siteId === siteId);
      const stations = group ? group.stations : [];
      const hasOnline = stations.some(s => s.status === 'Online');
      const allOpt = hasOnline
        ? '<option value="">--- 전체 ---</option>'
        : '<option value="" style="color:#9CA3AF; font-style:italic;">--- 전체 ---</option>';
      const opts = stations.map(s => {
        const isOnline = s.status === 'Online';
        const baseLabel = `${s.id}${s.modelName ? ' - ' + s.modelName : ''}`;
        if (isOnline) {
          return `<option value="${s.id}">${baseLabel}</option>`;
        }
        return `<option value="${s.id}" disabled style="color:#9CA3AF; font-style:italic;">${baseLabel} (오프라인)</option>`;
      }).join('');
      return allOpt + opts;
    }

    async function sendRemoteCommand() {
      const cmd = document.getElementById('remote_command').value;
      const siteId = document.getElementById('remote_site')?.value;
      const stationId = document.getElementById('remote_station')?.value;

      // 대상 결정 (서버에 전달할 target body)
      let targetBody, targetCount;
      if (stationId === '' || stationId == null) {
        if (!siteId) { alert('충전소를 선택하세요.'); return; }
        targetBody = { site_id: Number(siteId) };
        const group = currentSiteGroups.find(g => g.siteId === siteId);
        const onlineStations = group ? group.stations.filter(s => s.status === 'Online') : [];
        targetCount = onlineStations.length;
        if (targetCount === 0) { alert('선택한 충전소에 온라인 충전기가 없습니다.'); return; }
      } else {
        targetBody = { station_ids: [stationId] };
        targetCount = 1;
      }

      // 명령별 입력 검증 + 파라미터 body 빌드
      let path, paramsBody, cmdLabel;
      if (cmd === 'UpdateFirmware') {
        const location = document.getElementById('remote_fw_location').value;
        const retrieve_date = document.getElementById('remote_fw_date').value;
        if (!location) { alert('펌웨어 URL을 입력하세요.'); return; }
        path = '/api/portal/cs/ops/remote/update-firmware';
        paramsBody = { location, retrieve_date: retrieve_date || new Date().toISOString() };
        cmdLabel = 'UpdateFirmware';
      } else if (cmd === 'GetDiagnostics') {
        const location = document.getElementById('remote_diag_location').value;
        if (!location) { alert('업로드 URL을 입력하세요.'); return; }
        path = '/api/portal/cs/ops/remote/get-diagnostics';
        paramsBody = { location };
        cmdLabel = 'GetDiagnostics';
      } else if (cmd === 'Reset') {
        const type = document.getElementById('remote_reset_type').value;
        path = '/api/portal/cs/ops/remote/reset';
        paramsBody = { type };
        cmdLabel = `${type} Reset`;
      } else {
        return;
      }

      // 위험 명령 confirm
      if (targetCount > 1 && (cmd === 'Reset' || cmd === 'UpdateFirmware')) {
        if (!confirm(`충전소 내 ${targetCount}개 충전기에 ${cmdLabel} 명령을 일괄 전송합니다. 계속하시겠습니까?`)) return;
      } else if (targetCount === 1 && cmd === 'Reset') {
        if (!confirm(`${stationId} 충전기에 ${cmdLabel} 명령을 전송하시겠습니까?`)) return;
      }

      const resultEl = document.getElementById('remote_result');
      if (resultEl) resultEl.innerHTML = '<div style="font-size:13px; color:#64748B; padding:8px 0;">전송 중…</div>';

      // 서버에 단일 호출 — 서버가 충전기별로 일괄 전송
      const data = await api(path, {
        method: 'POST',
        body: JSON.stringify({ ...targetBody, ...paramsBody }),
      });

      // 응답 처리
      if (!data || !data.success) {
        if (resultEl) {
          const msg = (data && data.error && data.error.message) || '전송 실패';
          resultEl.innerHTML = `<div class="error-box" style="display:block; margin:0;">${msg}</div>`;
        }
        return;
      }

      const results = data.data?.results || [];
      const total = data.data?.total ?? results.length;
      const sent = data.data?.sent ?? results.filter(r => r.success).length;
      const failed = data.data?.failed ?? (total - sent);

      if (results.length === 0) {
        if (resultEl) resultEl.innerHTML = '<div style="color:#64748B; font-size:13px; padding:8px 0;">대상 충전기 없음</div>';
        return;
      }

      if (results.length === 1) {
        const r = results[0];
        showRemoteResult('remote_result', r.success
          ? { success: true, data: { message: '명령이 전송되었습니다.' } }
          : { success: false, error: { message: r.error?.message || '전송 실패' } });
        return;
      }

      // 다중 대상 — 요약 + 충전기별 라인
      if (resultEl) {
        const summary = `<div style="font-size:13px; color:#374151; padding:6px 0; font-weight:500;">총 ${total}대 — 전송 ${sent}, 실패 ${failed}</div>`;
        const lines = results.map(r => r.success
          ? `<div style="color:#10B981; font-size:13px; padding:4px 0;">&#10003; ${r.station_id}</div>`
          : `<div style="color:#EF4444; font-size:13px; padding:4px 0;">&#10005; ${r.station_id} — ${r.error?.message || '전송 실패'}</div>`
        ).join('');
        resultEl.innerHTML = summary + lines;
      }
    }

    async function savePgConfig(id) {
      const name = document.getElementById('pg_name')?.value?.trim();
      const pgType = document.getElementById('pg_pgType')?.value;
      const currency = document.getElementById('pg_currency')?.value;
      const accessCode = document.getElementById('pg_accessCode')?.value?.trim();
      const merchantId = document.getElementById('pg_merchantId')?.value?.trim();
      const hashKeyVal = document.getElementById('pg_hashKey')?.value?.trim();
      const invoiceTaxcode = document.getElementById('pg_invoiceTaxcode')?.value?.trim();
      const createOrderUrl = document.getElementById('pg_createOrderUrl')?.value?.trim();
      const refundUrl = document.getElementById('pg_refundUrl')?.value?.trim();
      const detailUrl = document.getElementById('pg_detailUrl')?.value?.trim();
      const ipnUrl = document.getElementById('pg_ipnUrl')?.value?.trim();
      const returnUrl = document.getElementById('pg_returnUrl')?.value?.trim();
      const cancelUrl = document.getElementById('pg_cancelUrl')?.value?.trim();
      const paymentTimeoutMin = Number(document.getElementById('pg_paymentTimeoutMin')?.value) || 10;
      const isSandbox = document.getElementById('pg_isSandbox')?.checked ?? true;

      if (!name || !accessCode || !merchantId || !createOrderUrl || !refundUrl || !detailUrl || !ipnUrl || !returnUrl || !cancelUrl) {
        alert('필수 항목을 모두 입력해주세요.'); return;
      }
      if (!id && !hashKeyVal) {
        alert('Hash Key를 입력해주세요.'); return;
      }

      const body = { name, pgType, currency, accessCode, merchantId, invoiceTaxcode, createOrderUrl, refundUrl, detailUrl, ipnUrl, returnUrl, cancelUrl, paymentTimeoutMin, isSandbox };
      if (hashKeyVal) body.hashKey = hashKeyVal;

      const method = id ? 'PUT' : 'POST';
      const url = id ? `/api/portal/cs/pg-configs/${id}` : '/api/portal/cs/pg-configs';

      const result = await api(url, { method, body: JSON.stringify(body) });
      if (result?.success) {
        closeModal();
        loadPgConfigs();
      } else {
        alert(result?.error?.message || '저장 실패');
      }
    }

                  ? `<button class="btn-danger-sm" onclick="deactivateManufacturer(${m.id})">비활성화</button>`
                  : ''}
              </div>
            </td>
          </tr>`).join('');

      const paginationHtml = renderPagination(currentPage, totalPages, 'loadManufacturers');

      setContent(`
        <div class="page-header">
          <div>
            <div class="page-title">제조사 관리</div>
            <div class="page-subtitle">x-token / x-channel 기반 충전기 제조사 인증 관리</div>
          </div>
          <button class="btn-primary" onclick="openCreateManufacturer()">+ 제조사 등록</button>
        </div>

        <div class="table-card">
          <div class="table-toolbar">
            <span class="table-toolbar-title">전체 ${total}개</span>
          </div>
          <table>
            <thead>
              <tr>
                <th>채널 ID (x-channel)</th>
                <th>제조사명</th>
                <th>상태</th>
                <th>등록일</th>
                <th>액션</th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
          ${paginationHtml}
        </div>
      `);
    }

    function renderPagination(currentPage, totalPages, loadFn) {
      if (totalPages <= 1) return '';
      const prev = currentPage > 1
        ? `<button class="page-btn" onclick="${loadFn}(${currentPage - 1})">&#8249;</button>` : '';
      const next = currentPage < totalPages
        ? `<button class="page-btn" onclick="${loadFn}(${currentPage + 1})">&#8250;</button>` : '';
      return `<div class="pagination">
        <span class="pagination-info">${currentPage} / ${totalPages} 페이지</span>
        <div class="pagination-btns">${prev}
          <span class="page-btn active">${currentPage}</span>
          ${next}</div>
      </div>`;
    }

    function esc(s) { return String(s).replace(/'/g, "\\'"); }

    function openCreateManufacturer() {
      openModal(`
        <div class="modal-title">제조사 등록</div>
        <div class="form-group">
          <label class="form-label">채널 ID (x-channel) *</label>
          <input class="form-input" id="mfr_channelId" placeholder="예: vendor_a, GRE">

          <div style="font-size:11px;color:#64748B;margin-top:6px;">
            체크 해제 시: 서버가 64자 hex 랜덤 토큰을 새로 발급 (권장 — 신규 출시용).<br>
            체크 시: 입력한 토큰을 그대로 등록 (이미 출고된 충전기 호환용).
          </div>
          <div id="mfr_plainTokenWrap" style="display:none;margin-top:10px;">
            <label class="form-label">기존 x-token *</label>

          </div>
        </div>
        <div class="modal-footer">
          <button class="btn-cancel" onclick="closeModal()">취소</button>
          <button class="btn-primary" onclick="submitCreateManufacturer()">등록</button>
        </div>
      `);

    function toggleImportTokenField() {
      const wrap = document.getElementById('mfr_plainTokenWrap');
      const checked = document.getElementById('mfr_importToken')?.checked;
      if (wrap) wrap.style.display = checked ? '' : 'none';
    }

    async function submitCreateManufacturer() {
      const channelId = document.getElementById('mfr_channelId')?.value?.trim();
      const name = document.getElementById('mfr_name')?.value?.trim();
      const importToken = document.getElementById('mfr_importToken')?.checked;
      const plainToken = importToken ? (document.getElementById('mfr_plainToken')?.value?.trim() || '') : '';

      if (!channelId || !name) { alert('채널 ID와 제조사명을 입력하세요.'); return; }
      if (!/^[A-Za-z0-9_\-]+$/.test(channelId)) { alert('채널 ID는 영문/숫자/언더스코어/하이픈만 허용됩니다.'); return; }
      if (importToken) {
        if (!plainToken) { alert('기존 x-token 값을 입력하세요.'); return; }
        if (!/^[A-Za-z0-9_\-]{16,128}$/.test(plainToken)) {
          alert('x-token은 16~128자, 영문/숫자/언더스코어/하이픈만 허용됩니다.');
          return;
        }
      }

      const body = importToken ? { channelId, name, plainToken } : { channelId, name };
      const data = await api('/api/portal/cs/manufacturers', {
        method: 'POST',
        body: JSON.stringify(body),
      });

      if (data?.success) {
        closeModal();
        const title = data.data?.imported ? '등록 완료 — 기존 토큰 임포트' : '등록 완료 — x-token 발급';
        showTokenModal(data.data.plainToken, channelId, title);
        loadManufacturers(1);
      } else {
        alert(data?.error?.message || '등록 실패');
      }
    }

    function showTokenModal(token, channelId, title) {
      openModal(`
        <div class="modal-title">${title}</div>
        <div style="background:#FEF3C7;border:1px solid #F59E0B;border-radius:8px;padding:12px 16px;margin-bottom:16px;font-size:13px;color:#92400E;">
          이 화면을 닫으면 토큰을 다시 확인할 수 없습니다.<br>지금 바로 복사하여 제조사에 안전하게 전달하세요.
        </div>
        <div class="form-group">
          <label class="form-label">채널 ID (x-channel)</label>
          <input class="form-input" value="${channelId}" readonly>
        </div>
        <div class="form-group">
          <label class="form-label">x-token (평문 — 1회만 표시)</label>
          <div style="display:flex;gap:8px;align-items:center;">
            <input class="form-input" id="plainTokenDisplay" value="${token}" readonly style="font-family:monospace;font-size:12px;background:#F8FAFC;">
            <button class="btn-primary" style="white-space:nowrap;padding:9px 14px;" onclick="copyToken()">복사</button>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn-primary" onclick="closeModal()">확인 (닫기)</button>
        </div>
      `);
    }

    function copyToken() {
      const el = document.getElementById('plainTokenDisplay');
      if (el) {
        el.select();
        navigator.clipboard.writeText(el.value).then(() => {
          const btn = el.nextElementSibling;
          if (btn) { btn.textContent = '복사됨!'; setTimeout(() => btn.textContent = '복사', 1500); }
        }).catch(() => {
          document.execCommand('copy');
        });
      }
    }

      openModal(`
        <div class="modal-title">제조사 수정</div>
        <div class="form-group">
          <label class="form-label">제조사명 *</label>

    async function submitEditManufacturer(id) {
      const name = document.getElementById('edit_mfr_name')?.value?.trim();
      const isActive = document.getElementById('edit_mfr_isActive')?.value === 'true';
      if (!name) { alert('제조사명을 입력하세요.'); return; }

    function openRegenerateToken(id, channelId) {
      openModal(`
        <div class="modal-title">토큰 재발급</div>

          기존 토큰은 즉시 무효화됩니다.<br>재발급 후 제조사에 새 토큰을 전달해야 합니다.
        </div>
        <p style="font-size:14px;margin-bottom:12px;">채널 ID: <strong>${channelId}</strong> 의 토큰을 재발급합니다.</p>

          <div id="rgn_plainTokenWrap" style="display:none;margin-top:10px;">
            <label class="form-label">새 x-token *</label>
            <input class="form-input" id="rgn_plainToken" placeholder="새 x-token 값 (16~128자, 영숫자/_/-)" style="font-family:monospace;font-size:12px;">

        <div class="modal-footer">

          <button class="btn-primary" onclick="submitRegenerateToken(${id}, '${channelId}')">재발급</button>
        </div>
      `);
